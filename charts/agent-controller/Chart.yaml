apiVersion: v2
name: agent-controller
description: >-
  The agent-controller system chart: the parent orchestrator (RAG skill/tool
  selection + ToolRun launcher), the core-controller operator (Tool/Skill/
  Agent/ToolRun/AgentRun/LocalTool CRDs), and optional infra (Redis session
  store, Qdrant vector store, NATS, Open WebUI chat front-end) -- each a
  subchart so they can be enabled/disabled independently while deploying as
  one release. Install the community-components chart afterward to populate
  the catalog with Tool/Skill/Agent CRs.
type: application
version: 0.2.0
appVersion: "0.1.0"
home: https://github.com/imaustink/agent-controller
sources:
  - https://github.com/imaustink/agent-controller
keywords:
  - agent
  - orchestrator
  - operator
  - llm
  - kubernetes
maintainers:
  - name: controller-agent
dependencies:
  # The long-lived parent orchestrator (apps/agent-orchestrator). Bundles its
  # own optional Qdrant instance as a transitive dependency (see the
  # subchart's own Chart.yaml / values `qdrant.enabled`).
  - name: agent-orchestrator
    version: "0.2.0"
    repository: "file://charts/agent-orchestrator"
    condition: agent-orchestrator.enabled
  # The Go/kubebuilder operator (controllers/core-controller). Its CRDs ship
  # in the subchart's crds/ dir, which Helm installs before any templated
  # resources in the whole release -- so the catalog subchart's Tool/Skill
  # CRs below always have their CRD present.
  - name: core-controller
    version: "0.1.0"
    repository: "file://charts/core-controller"
    condition: core-controller.enabled
  # GitHub Issues adapter (apps/integration-gateway) -- phase 1 of
  # docs/integrations-gateway.md's conversational path. Off by default;
  # calls the agent-orchestrator subchart's invoke Service, so enable that
  # too if you enable this.
  - name: integration-gateway
    version: "0.1.0"
    repository: "file://charts/integration-gateway"
    condition: integration-gateway.enabled
  # Optional Open WebUI chat UI (https://github.com/open-webui/open-webui) in
  # front of the orchestrator's OpenAI-compatible facade (ADR 0007), off by
  # default. Aliased to lowercase `openwebui` (no hyphen/camelCase) because
  # the subchart bakes its alias verbatim into k8s object names, which must
  # be valid lowercase DNS-1123 labels. Pinned exact -- bump deliberately
  # with `helm dependency update` after reviewing the chart's changelog at
  # https://github.com/open-webui/helm-charts.
  - name: open-webui
    alias: openwebui
    version: "15.2.0"
    repository: https://helm.openwebui.com/
    condition: openwebui.enabled
  # Optional NATS JetStream server for the queue-based tool-result channel.
  # When nats.enabled=true the orchestrator deployment gets AGENT_NATS_URL
  # pointing at this instance; tools publish their results via NatsSink and
  # the orchestrator subscribes via NatsJobReceiver, replacing the HTTP
  # callback Service on port 8080.  Off by default -- the HTTP callback path
  # remains the backward-compatible default when this is disabled.
  # Official chart: https://github.com/nats-io/k8s/tree/main/helm/charts/nats
  - name: nats
    version: "2.14.2"
    repository: https://nats-io.github.io/k8s/helm/charts/
    condition: nats.enabled
  # NOTE: optional SearXNG metasearch instance (values.yaml's `searxng` key,
  # backing community-components' web-search Tool) is deliberately NOT a
  # dependency here -- there is no maintained official SearXNG Helm chart to
  # pin to (searxng/searxng-helm-chart was archived May 2025). It's a
  # first-party template instead: templates/searxng.yaml, same reasoning
  # already applied to Redis (see agent-orchestrator/templates/redis.yaml).
