{{- if .Values.rbac.create }}
{{/*
ClusterRole granting exactly what internal/controller/*.go's
+kubebuilder:rbac markers declare -- kept in lockstep with
controllers/core-controller/config/rbac/role.yaml (regenerate both via
`make manifests` in that module after changing any marker). This is the
ONLY place in the system with `batch/jobs` create/delete permissions now
(ADR 0010) -- the orchestrator's own Role (charts/agent-orchestrator) no
longer has them.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "core-controller.fullname" . }}
  labels:
    {{- include "core-controller.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs/status"]
    verbs: ["get"]
  - apiGroups: ["core.controller-agent.dev"]
    resources: ["tools", "skills", "agents", "toolruns", "agentruns", "localtools", "integrationroutes"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["core.controller-agent.dev"]
    resources: ["tools/finalizers", "skills/finalizers", "agents/finalizers", "toolruns/finalizers", "agentruns/finalizers", "localtools/finalizers", "integrationroutes/finalizers"]
    verbs: ["update"]
  - apiGroups: ["core.controller-agent.dev"]
    resources: ["tools/status", "skills/status", "agents/status", "toolruns/status", "agentruns/status", "localtools/status", "integrationroutes/status"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "core-controller.fullname" . }}
  labels:
    {{- include "core-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "core-controller.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "core-controller.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- if .Values.leaderElection.enabled }}
---
{{/*
Leader election needs Lease objects, namespace-scoped to wherever the
controller itself runs (not the CR/Job namespaces above).
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "core-controller.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "core-controller.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "core-controller.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "core-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "core-controller.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "core-controller.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
