replicaCount: 1

image:
  repository: core-controller
  # Defaults to .Chart.AppVersion if empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""
  automount: true

rbac:
  # ClusterRole + ClusterRoleBinding (unlike agent-orchestrator's namespaced
  # Role -- this controller reconciles Tool/Skill/ToolRun CRs and creates
  # Jobs on behalf of whichever namespace they live in, which in general may
  # not be the namespace this controller itself runs in). Rules are exactly
  # what internal/controller/*.go uses -- kept in lockstep with
  # config/rbac/role.yaml (regenerate both via `make manifests` after
  # changing any +kubebuilder:rbac marker).
  #
  # KNOWN GAP (flagged, not yet addressed): this is cluster-wide read access
  # to Tool/Skill/ToolRun across every namespace, broader than strictly
  # necessary for a single-tenant deployment. Scoping the controller-runtime
  # manager cache to a fixed set of namespaces (and this RBAC down to a
  # namespaced Role) was considered but deferred -- see docs/adr/0010.
  create: true

metrics:
  # Kubebuilder's default scaffold binds metrics to "0" (disabled) unless
  # explicitly enabled; secure-by-default (HTTPS + authn/authz) when on.
  enabled: false
  port: 8443
  secure: true

# NATS settings propagated into every AgentRun Job by the controller
# (injected as AGENT_NATS_URL / AGENT_NATS_SUBJECT_PREFIX env vars).
# Must match the NATS Service the orchestrator connects to; override in
# values-minikube-demo.yaml once a concrete NATS URL is known.
nats:
  agentUrl: "nats://nats:4222"
  subjectPrefix: "agent"

# Controls the ImagePullPolicy the controller sets on every ToolRun/AgentRun
# Job it creates (not this controller's own Deployment -- that's image.pullPolicy
# above). Leave unset/empty for local/minikube dev, where run images are built
# straight into the cluster's own container runtime and never pushed to a
# registry -- IfNotPresent is the safe default there (see run_job.go). Set to
# "Always" for any deployment that pushes run images to a real registry under
# a mutable tag (e.g. ":latest"), or the kubelet will keep reusing whatever
# digest it already pulled for that tag and redeploys of tool/agent images
# will silently have no effect.
runJob:
  imagePullPolicy: ""

leaderElection:
  # Only matters when replicaCount > 1.
  enabled: false

healthProbe:
  port: 8081

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
affinity: {}
tolerations: []

podAnnotations: {}
podLabels: {}
