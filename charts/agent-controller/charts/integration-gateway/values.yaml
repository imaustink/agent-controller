replicaCount: 1

image:
  repository: integration-gateway
  # Defaults to .Chart.AppVersion if empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # This app never talks to the k8s API (it only calls agent-orchestrator's
  # HTTP API and the GitHub REST API) -- the ServiceAccount exists only
  # because every Pod needs one; automount is disabled since there's nothing
  # for this app to use the token for.
  create: true
  annotations: {}
  name: ""
  automount: false

port: 8090

config:
  # Base URL of agent-orchestrator's consumer-facing /invoke API (ADR 0006).
  orchestratorUrl: "http://agent-orchestrator-invoke:8081"
  # How this gateway authenticates its /invoke calls -- must resolve, via the
  # orchestrator's own identity resolver (config.staticIdentities on the
  # agent-orchestrator chart), to a role allowed to reach the SWE agent.
  # Read from a Secret (see secrets.orchestratorTokenKey below), never set
  # here in plaintext.
  #
  # GitHub API base URL (override for GitHub Enterprise Server).
  githubApiUrl: "https://api.github.com"
  # The App/bot's own GitHub login -- its own comments are ignored (loop
  # prevention). Required once the App/webhook is wired up.
  githubBotLogin: ""
  # The label that triggers automated triage (ADR 0024) when applied to a
  # GitHub issue. Not an assignee -- GitHub App bot users generally cannot
  # be set as issue assignees. Empty string disables the trigger.
  githubTriggerLabel: ""
  # PROD-GRADE, preferred for org-owned repos: grants roles based on live
  # GitHub org/team membership (see GithubTeamMembershipResolver in
  # src/identity.ts) -- JSON: {"<org>/<team-slug>": ["role", ...]}.
  # Adding/removing a person is a GitHub team membership change, no
  # commit/redeploy needed. Uses the same GitHub App/PAT credentials as the
  # reply client (needs Members: Read org permission, or read:org PAT scope).
  # Leave empty for a personal-account repo -- there's no org to check team
  # membership against; use githubCollaboratorRoles below instead.
  githubTeamRoles: ""
  # PROD-GRADE, preferred for personal-account repos (no GitHub Organization
  # to hang teams off of): grants roles based on the sender's actual
  # collaborator permission on the specific repo the webhook fired on (see
  # GithubCollaboratorPermissionResolver in src/identity.ts) -- JSON:
  # {"<permission-level>": ["role", ...]}, where permission-level is one of
  # GitHub's repo permission levels ("admin", "maintain", "write", "triage",
  # "read"). Adding/removing a person is a repo "manage access" change, no
  # commit/redeploy needed. Same credentials as githubTeamRoles above.
  githubCollaboratorRoles: ""
  # DEV/TEST-GRADE static allowlist mapping GitHub logins to identities (see
  # src/identity.ts) -- JSON: {"<login>": {"subject": "...", "roles": [...]}}.
  # Only consulted as a fallback for logins githubTeamRoles above doesn't
  # grant anything to -- e.g. a service account that isn't a team member.
  githubIdentities: ""
  pollIntervalMs: 3000
  pollTimeoutMs: 900000

# Per-chat-user GitHub identity linking (OAuth Device Flow, docs/adr/0022):
# turns this gateway into a general external-identity credential broker in
# addition to its existing GitHub-webhook-relay role, exposing a new
# internal HTTP API under /identity-link/* (bearer-token-authed, same HTTP
# server/port as the webhook endpoint -- see src/server.ts's handleRequest --
# no new Service/port needed). Off by default: none of the fields below are
# required/rendered unless enabled, and existing webhook-relay behavior is
# completely unaffected either way.
#
# As of the authorization-code (web) flow addition, the GitHub App backing
# this needs BOTH a client_id (device flow) AND a generated client secret
# (authcode token exchange -- device flow alone never needed one), plus a
# registered OAuth callback URL (see githubOauthRedirectUri below). Browser
# callers default to the authcode flow; device flow remains an explicit
# fallback for headless callers.
identityLink:
  enabled: false
  # GitHub App OAuth client_id, used by both the device flow and the
  # authorization-code flow. PUBLIC by design -- GitHub App client ids are
  # not sensitive (same reasoning values-minikube-demo.yaml already
  # documents for the Google OAuth client ID), so this is a plain config
  # value, never wired through the Secret.
  githubAppClientId: ""
  # Optional device-flow OAuth scope. Leave empty to use the app's own
  # default ("repo").
  githubDeviceFlowScope: ""
  # Redis URL for the identity-link token store. Reuses the SAME Redis
  # instance agent-orchestrator's conversation-session store uses
  # (docs/adr/0016) -- integration-gateway is a sibling subchart under the
  # same parent (charts/agent-controller), deployed into the same
  # release/namespace, so agent-orchestrator's Redis Service
  # ("<agent-orchestrator fullname>-redis", see
  # charts/agent-orchestrator/templates/redis.yaml) is trivially reachable
  # cross-subchart by in-cluster DNS. The umbrella chart pins
  # agent-orchestrator's fullnameOverride to "agent-orchestrator", so the
  # default below matches that pinned name -- override if you've changed
  # that pin or point this at a different/external Redis instance entirely.
  redisUrl: "redis://agent-orchestrator-redis:6379"
  # OAuth callback URL for the authorization-code (web) flow. MUST exactly
  # match the URL registered as this GitHub App's "Callback URL" -- GitHub
  # rejects the token exchange on any mismatch (scheme, host, path, or
  # trailing slash) -- and that registered URL must itself point at
  # https://<this gateway's public host>/identity-link/github/callback
  # (see src/server.ts's handleRequest for the route). Same
  # externally-registered-value-must-match-verbatim discipline as
  # GOOGLE_REDIRECT_URI in charts/agent-controller/values.yaml /
  # values-production.yaml (Open WebUI's Google SSO callback). No default on
  # purpose -- this MUST be set explicitly by whoever deploys with the
  # authcode flow enabled.
  githubOauthRedirectUri: ""

# Secrets: GITHUB_WEBHOOK_SECRET (required), GATEWAY_ORCHESTRATOR_TOKEN
# (required), and either GITHUB_TOKEN or the three GITHUB_APP_* fields
# (required for posting issue comments). When identityLink.enabled=true,
# also: IDENTITY_LINK_ENCRYPTION_KEY (required, a 32-byte AES-256-GCM key,
# base64-encoded, used to encrypt stored per-user GitHub tokens at rest),
# GATEWAY_IDENTITY_LINK_TOKEN (required, the bearer token agent-orchestrator
# authenticates its NEW /identity-link/* calls with -- the opposite
# direction from GATEWAY_ORCHESTRATOR_TOKEN above, which is how THIS gateway
# authenticates its calls to the orchestrator; two distinct tokens for two
# distinct directions), GITHUB_APP_CLIENT_SECRET (required once the
# authorization-code flow's token-exchange code path is invoked -- the
# GitHub App's generated client secret; device flow alone never needed
# this), and IDENTITY_LINK_STATE_SECRET (required for the same reason -- an
# HMAC signing key for the authcode flow's CSRF `state` tokens; a distinct
# key from IDENTITY_LINK_ENCRYPTION_KEY on purpose, so rotating one never
# forces rotating the other).
#
# By default the chart does NOT create a Secret -- bring your own via
# `existingSecret` (see charts/agent-orchestrator's values.yaml for the same
# convention/rationale). `secrets.create: true` is for local/dev convenience
# only.
secrets:
  create: false
  existingSecret: ""
  githubWebhookSecretKey: GITHUB_WEBHOOK_SECRET
  orchestratorTokenKey: GATEWAY_ORCHESTRATOR_TOKEN
  githubTokenKey: GITHUB_TOKEN
  githubAppIdKey: GITHUB_APP_ID
  githubAppPrivateKeyKey: GITHUB_APP_PRIVATE_KEY
  githubAppInstallationIdKey: GITHUB_APP_INSTALLATION_ID
  identityLinkEncryptionKeyKey: IDENTITY_LINK_ENCRYPTION_KEY
  identityLinkTokenKey: GATEWAY_IDENTITY_LINK_TOKEN
  githubAppClientSecretKey: GITHUB_APP_CLIENT_SECRET
  identityLinkStateSecretKey: IDENTITY_LINK_STATE_SECRET
  # Only read when secrets.create=true.
  githubWebhookSecret: ""
  orchestratorToken: ""
  githubToken: ""
  githubAppId: ""
  githubAppPrivateKey: ""
  githubAppInstallationId: ""
  identityLinkEncryptionKey: ""
  identityLinkToken: ""
  githubAppClientSecret: ""
  identityLinkStateSecret: ""

service:
  type: ClusterIP
  port: 8090

ingress:
  # GitHub must reach this Service directly -- unlike agent-orchestrator's
  # callback port, there's no in-cluster-only port to keep private here.
  enabled: false
  className: ""
  annotations: {}
  host: ""
  path: /
  pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Matches the hardened run contract in docs/security.md.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []
