replicaCount: 1

image:
  repository: agent-orchestrator
  # Defaults to .Chart.AppVersion if empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Creates the ServiceAccount the orchestrator runs as (see rbac.create
  # below for the permissions bound to it: read the Tool/Skill CRD catalog,
  # create/watch/delete ToolRun CRs -- it never talks to batch/jobs
  # directly, that's charts/core-controller's job, ADR 0010).
  create: true
  annotations: {}
  name: ""
  automount: true

rbac:
  # Namespace-scoped Role + RoleBinding (never a ClusterRole — the
  # orchestrator only needs to read the Tool/Skill catalog and manage
  # ToolRun CRs in one namespace, see docs/orchestrator.md and ADR 0010).
  create: true

# Namespace the orchestrator discovers Tool/Skill CRs in and creates ToolRun
# CRs into (AGENT_NAMESPACE). Defaults to the release namespace when empty.
namespace: ""

ports:
  http: 8081
  callback: 8080

config:
  # Ignored when qdrant.enabled=true below (the in-cluster subchart's
  # Service URL is derived automatically instead). Set this to point at an
  # existing/external Qdrant instance otherwise.
  qdrantUrl: "http://qdrant:6333"
  qdrantCollection: tools
  qdrantVectorSize: 1536
  qdrantSkillsCollection: skills
  embeddingModel: text-embedding-3-small
  selectionModel: gpt-4o-2024-08-06
  skillTopK: 3
  # Base URL Job pods use to reach the callback receiver. Leave empty to
  # default to the in-cluster callback Service DNS name (ADR 0006).
  callbackBaseUrl: ""
  # API group/version for the Tool/Skill/ToolRun CRDs (ADR 0010). Must match
  # charts/core-controller's installed CRDs.
  crdGroup: core.controller-agent.dev
  crdVersion: v1alpha1
  # Which IdentityResolver to build: "static" (default) or "oidc". See
  # src/rbac/static-identity-resolver.ts and src/rbac/oidc-identity-resolver.ts.
  identityResolver: static
  # JSON map of bearer token -> {subject, roles}. When identityResolver=static
  # this is the only resolver; when identityResolver=oidc it becomes a
  # fallback for tokens that fail oidc verification (see
  # staticIdentitiesExistingSecret below for the not-mutually-exclusive
  # behavior). Prefer staticIdentitiesExistingSecret for anything beyond
  # local/dev use: `staticIdentities` here lands in plaintext in the Helm
  # release's stored values (same caveat as secrets.create/values above),
  # which is not appropriate once the values file itself is committed
  # anywhere outside a private, secret-free repo.
  staticIdentities: ""
  # Existing Secret name holding the same JSON map (see staticIdentities
  # above) under staticIdentitiesExistingSecretKey. Takes precedence over
  # the inline `staticIdentities` value when set.
  #
  # Not exclusive with identityResolver=oidc: when both are set, the app
  # builds a CompositeIdentityResolver -- oidc verification first, falling
  # back to this static map only for tokens that fail it. Use this for
  # callers that structurally cannot present a real, refreshable OIDC token
  # (e.g. a chat UI with only a static API-key field), while callers capable
  # of real OIDC still go through full verification.
  staticIdentitiesExistingSecret: ""
  staticIdentitiesExistingSecretKey: AGENT_STATIC_IDENTITIES
  # Required when identityResolver=oidc: expected JWT `iss` claim.
  oidcIssuer: ""
  # Required when identityResolver=oidc: JWKS endpoint used to verify JWT
  # signatures (e.g. an IdP's `.well-known/jwks.json` or provider-specific
  # certs endpoint).
  oidcJwksUri: ""
  # Optional: expected JWT `aud` claim. Leave empty to skip audience
  # verification.
  oidcAudience: ""
  # Dot-path to the roles claim in the verified JWT, e.g. "roles" or
  # "realm_access.roles" (Keycloak).
  oidcRolesClaim: roles
  # NATS URL for the queue-based tool-result channel. Ignored when
  # nats.enabled=true (the in-cluster Service URL is derived automatically).
  # When non-empty the orchestrator uses NatsJobReceiver instead of the HTTP
  # CallbackReceiver -- AGENT_CALLBACK_SECRET / AGENT_CALLBACK_SECRET_REF_NAME
  # are no longer required in that case. Leave empty to use the HTTP callback
  # path (backward-compatible default).
  natsUrl: ""
  # Redis URL for the conversation-session store (docs/adr/0016). Ignored
  # when redis.enabled=true below (the in-cluster Service URL is derived
  # automatically). When non-empty the orchestrator uses RedisSessionStore
  # instead of the single-replica in-memory default.
  redisUrl: ""

# Per-chat-user GitHub identity linking (docs/adr/0022): lets the
# orchestrator resolve the CALLING USER's own linked GitHub token (via
# integration-gateway's new /identity-link/* API) and inject it per-run into
# an identity-linked Agent's launched Job, instead of that Agent always
# using a shared bot/PAT credential. Off by default -- both fields below are
# optional and, when left empty, no Agent should declare identityProviders
# (see charts/community-components) and this feature has no effect.
identityLink:
  enabled: false
  # Base URL of integration-gateway's identity-link API (in-cluster Service
  # DNS). Mirrors config.orchestratorUrl above's naming precedent, just in
  # the opposite direction -- pointing at integration-gateway's Service
  # instead of this chart's own. No default: set this to the
  # integration-gateway release's Service name/port (see that chart's
  # templates/service.yaml), e.g.
  # "http://integration-gateway:8090" for the umbrella chart's pinned name.
  gatewayUrl: ""
  # Secrets: IDENTITY_LINK_GATEWAY_TOKEN (see secrets block below). Must
  # match the value configured as integration-gateway's
  # identityLink.secrets.identityLinkToken (GATEWAY_IDENTITY_LINK_TOKEN env
  # var on that side) -- same shared-secret-value convention already used
  # for AGENT_CALLBACK_SECRET / GATEWAY_ORCHESTRATOR_TOKEN in the reverse
  # direction.

# Secrets: OPENAI_API_KEY (required), AGENT_CALLBACK_SECRET (required, no
# default — must not be guessable), AGENT_QDRANT_API_KEY (optional).
#
# By default the chart does NOT create a Secret — bring your own via
# `existingSecret` (e.g. populated by an external-secrets operator / sealed
# secrets / `kubectl create secret`). Setting `create: true` and passing
# values here is provided for local/dev convenience only: those values land
# in plaintext in the Helm release's stored values, which is not appropriate
# for production secrets.
secrets:
  create: false
  existingSecret: ""
  openaiApiKeyKey: OPENAI_API_KEY
  callbackSecretKey: AGENT_CALLBACK_SECRET
  qdrantApiKeyKey: AGENT_QDRANT_API_KEY
  # Only used when identityLink.enabled=true above.
  identityLinkGatewayTokenKey: IDENTITY_LINK_GATEWAY_TOKEN
  # Only read when secrets.create=true.
  openaiApiKey: ""
  callbackSecret: ""
  qdrantApiKey: ""
  identityLinkGatewayToken: ""

service:
  invoke:
    type: ClusterIP
    port: 8081
  callback:
    type: ClusterIP
    port: 8080

ingress:
  # Exposes only the invoke Service (consumer-facing /invoke, /v1/*) — the
  # callback Service is deliberately never routed through an Ingress; it's
  # in-cluster-only for Job pods (ADR 0006).
  enabled: false
  className: ""
  annotations: {}
  host: ""
  path: /
  pathType: Prefix
  tls: []

networkPolicy:
  # Mirrors the network-boundary separation documented in ADR 0006: the
  # invoke port is for whoever calls the agent, the callback port is for
  # Job pods only, in-cluster. Disabled by default; enable once you know
  # your cluster's CNI supports NetworkPolicy and you've set the selectors
  # below.
  enabled: false
  # NetworkPolicyPeer list for the invoke port. Empty = allow from anywhere
  # in the cluster (still namespaced to this policy's namespace unless a
  # namespaceSelector is given in a peer).
  invokeFrom: []
  # podSelector.matchLabels identifying the Job pods allowed to reach the
  # callback port (e.g. labels applied by job-launcher.ts to launched Jobs).
  callbackFromPodSelector: {}

resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Matches the hardened run contract in run.sh / docs/security.md.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# The runtime image's root filesystem is read-only; only /tmp needs to be
# writable (matches --tmpfs /tmp in run.sh).
extraVolumes:
  - name: tmp
    emptyDir: {}
extraVolumeMounts:
  - name: tmp
    mountPath: /tmp

podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}

# GET /v1/models needs no auth, so it's a safe, cheap probe target.
livenessProbe:
  httpGet:
    path: /v1/models
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /v1/models
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

extraEnv: []

# LocalTool executor sidecars (ADR 0014). When enabled, one sidecar container
# per listed runtime runs in this pod and executes LocalTool CRs inside a
# bubblewrap sandbox, reached by the orchestrator over a shared unix socket.
# Disabled by default: it adds always-on sidecar containers and requires
# UNPRIVILEGED USER NAMESPACES on the node (for the per-tool network sandbox).
localTool:
  enabled: false
  # Shared emptyDir directory holding one <runtime>.sock per sidecar.
  socketDir: /run/localtool
  # Comma-separated fetch-registry allowlist enforced by every sidecar
  # (fail-closed). Also the only hosts a shell tool's sourceURL may target.
  allowedRegistryHosts: "registry.npmjs.org,pypi.org,files.pythonhosted.org,proxy.golang.org,sum.golang.org"
  defaultTimeoutSeconds: 30
  pullPolicy: IfNotPresent
  # One sidecar container per entry. Trim to only the languages you use —
  # each is an always-on container with its own image + cache.
  runtimes:
    - name: node
      image: localtool-executor-node:latest
    - name: python
      image: localtool-executor-python:latest
    - name: go
      image: localtool-executor-go:latest
    - name: shell
      image: localtool-executor-shell:latest
  # Per-runtime fetch cache. emptyDir (default) re-fetches after every restart;
  # set persistentVolumeClaimName to use pre-created PVCs named
  # "<persistentVolumeClaimName>-<runtime>" for a warm cache (recommended for
  # production).
  cache:
    persistentVolumeClaimName: ""
    sizeLimit: 1Gi
  resources: {}
  # bubblewrap creates user/network namespaces per invocation. That needs
  # unprivileged user namespaces on the node AND an Unconfined seccomp profile:
  # the RuntimeDefault profile filters the namespace-creation clone flags once
  # all capabilities are dropped, so bwrap fails with "No permissions to create
  # new namespace". Unconfined is safe here — the container keeps non-root +
  # cap-drop-ALL + read-only rootfs, and the sidecar has no k8s identity.
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    seccompProfile:
      type: Unconfined
    capabilities:
      drop: ["ALL"]

# Optional bundled Qdrant instance (github.com/qdrant/qdrant-helm). Disabled
# by default -- most real deployments should point config.qdrantUrl at an
# existing Qdrant (managed, shared, or deployed separately) instead of
# coupling its lifecycle to this release. Enabling this is meant for
# local/dev/single-cluster-demo convenience only: it's a single replica with
# no backup/disaster-recovery story (see the subchart's own README for its
# production limitations).
#
# Run `helm dependency update charts/agent-orchestrator` once before
# `helm install`/`helm package` so the subchart is fetched.
qdrant:
  enabled: false
  replicaCount: 1
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  # Set to true (or a string) to require an API key; then also set it as
  # config.qdrantApiKey / secrets.qdrantApiKey above so the orchestrator
  # sends the same key. Left disabled by default to keep the local/dev path
  # simple -- enable both sides together for anything less trusted than a
  # single-tenant dev cluster.
  apiKey: false

# Optional lightweight Redis instance for the conversation session store
# (docs/adr/0016). Uses the official redis:alpine image (no Bitnami subchart)
# so there are no external chart dependencies to fetch. Off by default --
# the in-memory session store is used when this is disabled (single replica
# only; a shared Redis store is the scale-out path).
redis:
  enabled: false
  image:
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  storageClass: ""
  storageSize: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Toggles AGENT_NATS_URL derivation only -- the actual NATS server is the
# umbrella chart's shared `nats` dependency (see charts/agent-controller/Chart.yaml),
# not bundled here. When enabled, AGENT_NATS_URL is set automatically to that
# shared in-cluster Service's DNS name, and tool Jobs deliver their results
# over NATS instead of the HTTP callback receiver. The HTTP callback Service
# (port 8080) stays up as a fallback but receives no traffic in NATS mode.
# Off by default. Must be set together with the umbrella chart's top-level
# `nats.enabled` (which actually deploys the server).
nats:
  enabled: false

