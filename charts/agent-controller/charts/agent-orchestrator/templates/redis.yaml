{{- if .Values.redis.enabled }}
{{- /*
  Lightweight Redis instance for the conversation session store (docs/adr/0016).
  Uses the official redis:alpine image (always available on Docker Hub) rather
  than a Bitnami subchart — Bitnami periodically yanks old tags, causing
  ErrImagePull failures on minikube. Session state is best-effort (a routing
  hint, not durable data), so no persistence is needed and data loss on pod
  restart is acceptable.

  IMPORTANT: this pod's labels/selector use an explicitly DISTINCT
  app.kubernetes.io/name ("...-redis"), not agent-orchestrator.selectorLabels
  (which yields plain "agent-orchestrator"). The main Deployment and its
  Services (service-invoke.yaml, service-callback.yaml) select on exactly
  that base name+instance pair with no further narrowing — reusing it here
  (as a previous revision of this file did, only adding component: redis on
  top, which those Services' selectors never check) made every one of them
  ambiguously match this pod too, and gave the two Deployments overlapping
  pod selectors (a real k8s anti-pattern, not just a cosmetic label mismatch).
*/}}
{{- $redisName := printf "%s-redis" (include "agent-orchestrator.name" .) }}
{{- $redisSelectorLabels := printf "app.kubernetes.io/name: %s\napp.kubernetes.io/instance: %s" $redisName .Release.Name }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-orchestrator.fullname" . }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- $redisSelectorLabels | nindent 4 }}
    helm.sh/chart: {{ include "agent-orchestrator.chart" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- $redisSelectorLabels | nindent 6 }}
  template:
    metadata:
      labels:
        {{- $redisSelectorLabels | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
      containers:
        - name: redis
          image: "redis:{{ .Values.redis.image.tag | default "7-alpine" }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy | default "IfNotPresent" }}
          args:
            # No on-disk persistence: session records are best-effort routing hints.
            - "--save"
            - ""
            - "--appendonly"
            - "no"
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-orchestrator.fullname" . }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- $redisSelectorLabels | nindent 4 }}
    helm.sh/chart: {{ include "agent-orchestrator.chart" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- $redisSelectorLabels | nindent 4 }}
{{- end }}
