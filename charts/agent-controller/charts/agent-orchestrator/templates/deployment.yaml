apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-orchestrator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-orchestrator.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "agent-orchestrator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "agent-orchestrator.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "agent-orchestrator.serviceAccountName" . }}
      {{- if .Values.localTool.enabled }}
      # LocalTool executor sidecars must NOT inherit the orchestrator's k8s
      # identity (ADR 0014): disable pod-wide automount and project the token
      # only into the orchestrator container's volumeMounts below.
      automountServiceAccountToken: false
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: agent-orchestrator
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.ports.http }}
              protocol: TCP
            - name: callback
              containerPort: {{ .Values.ports.callback }}
              protocol: TCP
          env:
            - name: AGENT_NAMESPACE
              value: {{ include "agent-orchestrator.toolNamespace" . | quote }}
            - name: AGENT_QDRANT_URL
              value: {{ include "agent-orchestrator.qdrantUrl" . | quote }}
            - name: AGENT_QDRANT_COLLECTION
              value: {{ .Values.config.qdrantCollection | quote }}
            - name: AGENT_QDRANT_VECTOR_SIZE
              value: {{ .Values.config.qdrantVectorSize | quote }}
            - name: AGENT_QDRANT_SKILLS_COLLECTION
              value: {{ .Values.config.qdrantSkillsCollection | quote }}
            - name: AGENT_EMBEDDING_MODEL
              value: {{ .Values.config.embeddingModel | quote }}
            - name: AGENT_SELECTION_MODEL
              value: {{ .Values.config.selectionModel | quote }}
            - name: AGENT_SKILL_TOP_K
              value: {{ .Values.config.skillTopK | quote }}
            - name: AGENT_CALLBACK_PORT
              value: {{ .Values.ports.callback | quote }}
            - name: AGENT_HTTP_PORT
              value: {{ .Values.ports.http | quote }}
            - name: AGENT_CALLBACK_BASE_URL
              value: {{ include "agent-orchestrator.callbackBaseUrl" . | quote }}
            - name: AGENT_CRD_GROUP
              value: {{ .Values.config.crdGroup | quote }}
            - name: AGENT_CRD_VERSION
              value: {{ .Values.config.crdVersion | quote }}
            {{- if .Values.localTool.enabled }}
            - name: AGENT_LOCALTOOL_SOCKET_DIR
              value: {{ .Values.localTool.socketDir | quote }}
            - name: AGENT_LOCALTOOL_TIMEOUT_SECONDS
              value: {{ .Values.localTool.defaultTimeoutSeconds | quote }}
            {{- end }}
            {{- if .Values.config.staticIdentities }}
            - name: AGENT_STATIC_IDENTITIES
              value: {{ .Values.config.staticIdentities | quote }}
            {{- end }}
            {{- if or .Values.config.natsUrl (index .Values "nats" "enabled") }}
            - name: AGENT_NATS_URL
              value: {{ include "agent-orchestrator.natsUrl" . | quote }}
            {{- end }}
            {{- if or .Values.config.redisUrl .Values.redis.enabled }}
            - name: AGENT_REDIS_URL
              value: {{ include "agent-orchestrator.redisUrl" . | quote }}
            {{- end }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | default (include "agent-orchestrator.fullname" .) }}
                  key: {{ .Values.secrets.openaiApiKeyKey }}
            - name: AGENT_CALLBACK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | default (include "agent-orchestrator.fullname" .) }}
                  key: {{ .Values.secrets.callbackSecretKey }}
            {{/*
            ToolRunLauncher never embeds the raw callback secret into a
            ToolRun CR -- only its k8s Secret name/key (ADR 0010), so the
            core-controller can wire it into the launched Job via
            secretKeyRef instead. These are the same Secret/key the
            orchestrator itself uses above to verify inbound callbacks.
            */}}
            - name: AGENT_CALLBACK_SECRET_REF_NAME
              value: {{ .Values.secrets.existingSecret | default (include "agent-orchestrator.fullname" .) | quote }}
            - name: AGENT_CALLBACK_SECRET_REF_KEY
              value: {{ .Values.secrets.callbackSecretKey | quote }}
            {{- if or .Values.secrets.qdrantApiKey .Values.secrets.existingSecret }}
            - name: AGENT_QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | default (include "agent-orchestrator.fullname" .) }}
                  key: {{ .Values.secrets.qdrantApiKeyKey }}
                  optional: true
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if or .Values.localTool.enabled .Values.extraVolumeMounts }}
          volumeMounts:
            {{- if .Values.localTool.enabled }}
            - name: localtool-sockets
              mountPath: {{ .Values.localTool.socketDir }}
            - name: kube-api-access
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
        {{- if .Values.localTool.enabled }}
        {{- range .Values.localTool.runtimes }}
        - name: localtool-executor-{{ .name }}
          image: "{{ .image }}"
          imagePullPolicy: {{ $.Values.localTool.pullPolicy }}
          securityContext:
            {{- toYaml $.Values.localTool.securityContext | nindent 12 }}
          env:
            - name: LOCALTOOL_RUNTIME
              value: {{ .name | quote }}
            - name: LOCALTOOL_SOCKET_DIR
              value: {{ $.Values.localTool.socketDir | quote }}
            - name: LOCALTOOL_CACHE_DIR
              value: /var/cache/localtool
            - name: LOCALTOOL_ALLOWED_REGISTRY_HOSTS
              value: {{ $.Values.localTool.allowedRegistryHosts | quote }}
            - name: LOCALTOOL_DEFAULT_TIMEOUT_SECONDS
              value: {{ $.Values.localTool.defaultTimeoutSeconds | quote }}
          volumeMounts:
            - name: localtool-sockets
              mountPath: {{ $.Values.localTool.socketDir }}
            - name: localtool-cache-{{ .name }}
              mountPath: /var/cache/localtool
          {{- with $.Values.localTool.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
        {{- end }}
      {{- if or .Values.localTool.enabled .Values.extraVolumes }}
      volumes:
        {{- if .Values.localTool.enabled }}
        - name: localtool-sockets
          emptyDir: {}
        - name: kube-api-access
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3607
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        fieldPath: metadata.namespace
        {{- range .Values.localTool.runtimes }}
        - name: localtool-cache-{{ .name }}
          {{- if $.Values.localTool.cache.persistentVolumeClaimName }}
          persistentVolumeClaim:
            claimName: {{ printf "%s-%s" $.Values.localTool.cache.persistentVolumeClaimName .name }}
          {{- else }}
          emptyDir:
            sizeLimit: {{ $.Values.localTool.cache.sizeLimit }}
          {{- end }}
        {{- end }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
