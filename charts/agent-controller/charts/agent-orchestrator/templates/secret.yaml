{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent-orchestrator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-orchestrator.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secrets.openaiApiKeyKey }}: {{ .Values.secrets.openaiApiKey | quote }}
  {{ .Values.secrets.callbackSecretKey }}: {{ .Values.secrets.callbackSecret | quote }}
  {{- if .Values.secrets.qdrantApiKey }}
  {{ .Values.secrets.qdrantApiKeyKey }}: {{ .Values.secrets.qdrantApiKey | quote }}
  {{- end }}
  {{- if .Values.identityLink.enabled }}
  {{ .Values.secrets.identityLinkGatewayTokenKey }}: {{ .Values.secrets.identityLinkGatewayToken | quote }}
  {{- end }}
{{- end }}
