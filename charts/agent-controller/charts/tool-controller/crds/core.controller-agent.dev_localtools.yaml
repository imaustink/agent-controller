---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: localtools.core.controller-agent.dev
spec:
  group: core.controller-agent.dev
  names:
    kind: LocalTool
    listKind: LocalToolList
    plural: localtools
    singular: localtool
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: LocalTool is the Schema for the localtools API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of LocalTool
            properties:
              allowedRoles:
                description: |-
                  allowedRoles gates RAG retrieval (RBAC filter) — caller must have at least
                  one of these roles for this LocalTool to be a candidate.
                items:
                  type: string
                minItems: 1
                type: array
              checksum:
                description: |-
                  checksum is the lowercase hex sha256 digest of the fetched artifact,
                  verified by the sidecar before execution. REQUIRED for shell (integrity
                  of an arbitrary URL); recommended for the other runtimes.
                type: string
              description:
                description: description is fed to the orchestrator's embedder for
                  RAG tool retrieval.
                minLength: 1
                type: string
              entry:
                description: |-
                  entry is the module/console-script/binary the sidecar invokes within the
                  fetched package when it differs from the package's default. Optional.
                type: string
              env:
                description: env are static, non-secret environment variables passed
                  to the tool.
                items:
                  description: |-
                    EnvVar is a plain name/value pair injected into the tool's Job container.
                    Values that must come from Secrets belong on `secretEnv` below (or the
                    ToolRun's callback secretRef) — never a literal here.
                  properties:
                    name:
                      description: name of the environment variable.
                      type: string
                    value:
                      description: value of the environment variable.
                      type: string
                  required:
                  - name
                  - value
                  type: object
                type: array
              input:
                description: |-
                  input describes the stdin contract for the tool (the ABI is: JSON/string
                  on stdin -> one final JSON envelope on stdout; exit 0 = success).
                type: string
              network:
                description: |-
                  network opts this tool into egress. Default false: the sidecar runs the
                  tool with its network namespace unshared (no network). Set true only for
                  tools that must reach out (e.g. an HTTP fetcher) — those tools remain
                  responsible for their own SSRF defenses.
                type: boolean
              output:
                description: output describes the tool's result envelope shape.
                type: string
              package:
                description: |-
                  package is the registry package coordinate the sidecar fetches — an npm
                  package name (node), a PyPI distribution (python), or a Go module path
                  including the command, e.g. example.com/x/cmd/tool (go). Required for
                  node/python/go; ignored for shell (which uses sourceURL).
                type: string
              resources:
                description: |-
                  resources are the per-execution resource bounds (mapped to rlimits by the
                  sidecar), mirroring the cpu/memory subset used elsewhere.
                properties:
                  limits:
                    additionalProperties:
                      type: string
                    type: object
                  requests:
                    additionalProperties:
                      type: string
                    type: object
                type: object
              runtime:
                description: |-
                  runtime selects which executor sidecar runs this tool. Each runtime
                  resolves `package`/`version` (or `sourceURL`/`checksum` for shell)
                  against its own registry and toolchain.
                enum:
                - node
                - python
                - go
                - shell
                type: string
              secretEnv:
                description: |-
                  secretEnv are environment variables sourced from Secret keys in the same
                  namespace (never literal values). The ORCHESTRATOR resolves these (it
                  holds the k8s identity; the sidecars deliberately do not) and passes the
                  resolved values to the sidecar over the pod-local unix socket.
                items:
                  description: |-
                    SecretEnvVar names a Job container environment variable whose value comes
                    from a Secret key in the SAME namespace as the Tool/ToolRun, resolved via
                    corev1.EnvVarSource.SecretKeyRef at Job-build time. Only the reference
                    (secret name + key) lives in the Tool spec — never the secret value
                    itself, same discipline as ToolRunCallback.SecretRef for the callback
                    HMAC secret. Needed because ordinary tool containers (e.g. recipe-scraper's
                    OPENAI_API_KEY, recipe-publisher's GITHUB_TOKEN) require real secrets that
                    `env` (non-secret, catalog metadata) cannot carry.
                  properties:
                    name:
                      description: name of the environment variable to set in the
                        tool's Job container.
                      type: string
                    secretRef:
                      description: secretRef selects the Secret key providing the
                        value.
                      properties:
                        key:
                          description: key within the Secret's data.
                          type: string
                        name:
                          description: name of the Secret.
                          type: string
                      required:
                      - key
                      - name
                      type: object
                  required:
                  - name
                  - secretRef
                  type: object
                type: array
              sourceURL:
                description: |-
                  sourceURL is the pinned https:// location of the script to run. Required
                  for the shell runtime (which has no package registry); ignored otherwise.
                type: string
              tier:
                description: tier is an operator-defined cost/trust classification
                  (e.g. "standard", "privileged").
                type: string
              timeoutSeconds:
                description: |-
                  timeoutSeconds bounds a single execution; the sidecar SIGKILLs past it.
                  Falls back to the orchestrator/sidecar default (30s) when unset.
                format: int32
                minimum: 1
                type: integer
              version:
                description: |-
                  version is the EXACT pinned version to fetch (no ranges/tags like
                  "latest" or "^1.2.0"). Required for node/python/go; the sidecar rejects
                  unpinned versions fail-closed. Ignored for shell.
                type: string
            required:
            - allowedRoles
            - description
            - input
            - output
            - runtime
            type: object
          status:
            description: status defines the observed state of LocalTool
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the LocalTool resource.
                  Standard condition types include "Available"/"Progressing"/"Degraded";
                  this controller uses "Ready" to report spec validity.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
