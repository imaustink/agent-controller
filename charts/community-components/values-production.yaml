# values-production.yaml — Tool/Skill/Agent catalog on the homelab cluster
# (namespace controller-agent). Consumed automatically by
# .github/workflows/deploy.yml on every push to main; formerly lived as
# values-community-components.yaml in the private imaustink/homelab repo and
# was fetched cross-repo via a GitHub App token on every deploy -- moved here
# to drop that indirection now that nothing in this file is a real secret.
#
# First-time manual install AFTER agent-controller (its CRs need the CRDs
# that chart installs):
#
#   helm install community-components charts/community-components -n controller-agent \
#     -f charts/community-components/values-production.yaml

enabled: true

crdApiVersion: core.controller-agent.dev/v1alpha1

# Chart now templates recipe-scraper/recipe-publisher/opencode-swe-agent/
# web-search's ServiceAccounts itself (serviceAccount.create default true per
# component) — this is what actually attaches the private-registry pull
# secret to them.
imagePullSecrets:
  - name: docker-registry-credentials

recipeScraper:
  enabled: true
  image: registry.kurpuis.com:5000/recipe-scraper:latest
  serviceAccountName: recipe-scraper
  openai:
    secretName: agent-orchestrator-secrets
    secretKey: OPENAI_API_KEY

# web-search: queries the in-cluster SearXNG instance (agent-controller
# chart's searxng.enabled=true — values-production.yaml). Default
# searxngBaseUrl already matches that release's name ("agent-controller").
webSearch:
  enabled: true
  image: registry.kurpuis.com:5000/web-search:latest
  serviceAccountName: web-search

# web-fetch: fetches a single URL and returns its main readable content as
# Markdown. Required alongside webSearch above — the web-search skill's
# toolRefs lists both tools, and its derived audience (ADR 0011) is empty
# without this one. No external dependency (SSRF-guarded).
webFetch:
  enabled: true
  image: registry.kurpuis.com:5000/web-fetch:latest
  serviceAccountName: web-fetch

# kubectl-readonly: cluster debugging tool. Grants its ServiceAccount a
# cluster-wide read-only ClusterRole (see
# charts/community-components/templates/clusterrole-kubectl-readonly.yaml),
# including get/list/watch on Secrets -- the tool's own code (not RBAC) is
# what keeps values out of its output. See tools/kubectl-readonly/README.md
# before flipping this off elsewhere if that trade-off isn't acceptable.
kubectlReadonly:
  enabled: true
  image: registry.kurpuis.com:5000/kubectl-readonly:latest
  serviceAccountName: kubectl-readonly

recipePublisher:
  enabled: true
  image: registry.kurpuis.com:5000/recipe-publisher:latest
  serviceAccountName: recipe-publisher
  mealieBaseUrl: "https://recipes.kurpuis.com"
  ingredientParser: "nlp"
  # Create first:
  #   kubectl create secret generic recipe-publisher-secrets -n controller-agent \
  #     --from-literal=MEALIE_API_TOKEN=<token>
  secretName: recipe-publisher-secrets
  secretKey: MEALIE_API_TOKEN

# opencode-swe-agent: privileged GitHub coding sub-agent. DISABLED in prod --
# the Claude Code engine (claudeCodeSweAgent below) is now the SWE agent for
# every path: the auto-triage IntegrationRoute and the self-improvement skill
# both point their agentRef at claude-code-swe-agent (see integrationRoutes
# and skills below). Re-enable only if reverting those back to opencode.
#
# History: cut over from PAT-only (Phase A) to per-user GitHub identity
# linking (docs/adr/0022, Phase B) -- the opencode-swe-secrets GITHUB_TOKEN
# key is retired as part of that cutover; ANTHROPIC_API_KEY remains PAT-based.
opencodeSweAgent:
  enabled: false
  image: registry.kurpuis.com:5000/opencode-swe-agent:latest
  serviceAccountName: opencode-swe-agent
  secretName: opencode-swe-secrets
  secretKey: GITHUB_TOKEN
  anthropicSecretKey: ANTHROPIC_API_KEY
  # Dual-token pattern (docs/adr/0022 update): the same GitHub App used by
  # integration-gateway for identity-link now also backs installation-token
  # writes here. Copied (not cross-referenced) into opencode-swe-secrets
  # from integration-gateway-secrets so this chart doesn't depend on that
  # one's secret name.
  githubAppIdSecretKey: GITHUB_APP_ID
  githubAppPrivateKeySecretKey: GITHUB_APP_PRIVATE_KEY
  githubAppInstallationIdSecretKey: GITHUB_APP_INSTALLATION_ID
  githubAppSlug: k5s-bot
  # Per-user GitHub identity linking (docs/adr/0022) -- agent-orchestrator/
  # integration-gateway's identityLink.enabled are already on (see
  # charts/agent-controller/values-production.yaml). Flipping this breaks
  # every opencode-swe-agent request for every caller until they complete
  # the device-flow link. Now that the App creds above are also set, this
  # unlocks the dual-token pattern rather than pure per-user-token writes.
  identityLink:
    enabled: true
    providers:
      - github

# claude-code-swe-agent: requires claude-code-swe-secrets to exist (see
# values.yaml's comment block for this key for the exact `kubectl create
# secret` invocation) -- CI builds/pushes the image, but Helm can't source
# secret VALUES on its own, so that Secret is still a manual prerequisite.
#
# identityLink.providers is ["claude"] only, not ["github", "claude"]:
# agent-orchestrator's per-caller identity gate (docs/adr/0022, extended by
# 0027) only resolves the FIRST declared provider end-to-end today -- a
# second entry would never actually be linked/injected. Git/gh operations
# still work without per-user GitHub attribution: resolveGithubToken prefers
# the GitHub App installation token (githubAppIdSecretKey/etc. below) over
# any static PAT whenever all three App fields are configured, regardless of
# identityLink, so commits/PRs attribute to the k5s-bot App identity instead
# of the specific calling user -- same as opencode-swe-agent's own non-
# identity-linked-GitHub posture, just for this agent's git side specifically.
#
# No static anthropicSecretKey/claudeCodeOAuthTokenSecretKey needed here:
# with "claude" in identityLink.providers, delegateToAgent (agent-
# orchestrator) refuses to launch a Job at all until the caller has a linked
# Claude token, so a per-run CLAUDE_CODE_OAUTH_TOKEN is always present by the
# time this agent actually runs -- a static fallback key would just be dead
# config nobody ever reads (claude-code-swe-secrets therefore only needs the
# three GITHUB_APP_* keys below).
claudeCodeSweAgent:
  enabled: true
  image: registry.kurpuis.com:5000/claude-code-swe-agent:latest
  serviceAccountName: claude-code-swe-agent
  secretName: claude-code-swe-secrets
  secretKey: GITHUB_TOKEN
  anthropicSecretKey: ""
  claudeCodeOAuthTokenSecretKey: ""
  githubAppIdSecretKey: GITHUB_APP_ID
  githubAppPrivateKeySecretKey: GITHUB_APP_PRIVATE_KEY
  githubAppInstallationIdSecretKey: GITHUB_APP_INSTALLATION_ID
  githubAppSlug: k5s-bot
  model: ""
  identityLink:
    enabled: true
    providers:
      - claude
      # Required for Remote Control (see remoteControl below) -- without
      # this, agent-orchestrator never resolves/injects the per-run
      # CLAUDE_LOGIN_CREDENTIALS_JSON secret the seed-claude-credentials
      # init container reads, and remoteControl.enabled alone does nothing.
      - claude-remote
  # Claude Code Remote Control (claude.ai/code session takeover) for
  # ai-triage runs, replacing the old session-page link in the triage
  # comment. Also requires: (1) the cluster's Agent CRD to actually have the
  # initContainers field -- `helm upgrade` never updates CRDs on an existing
  # release, so this must be applied manually once:
  #   kubectl apply -f controllers/core-controller/config/crd/bases/core.controller-agent.dev_agents.yaml
  # (2) integration-gateway's claudeAuth.enabled=true (see
  # charts/agent-controller/values-production.yaml) so its `mode=login` PTY
  # flow is actually wired up, not just the setup-token one.
  #
  # Re-enabled 2026-07-24: a real triage run under this DID complete and
  # reopened an existing PR, so the completion-detection path isn't as
  # broken as the earlier debug-pod probe suggested -- likely just slow
  # (claude-runner.ts's polling interval) rather than genuinely stuck.
  # Iterating on the exact polling behavior locally (a real container, not
  # the live cluster) rather than disabling this again.
  remoteControl:
    enabled: true

skills:
  recipeRefining:
    enabled: true
  # self-improvement: drafts a new Skill/Tool CR from a successful ad-hoc
  # turn and opens a PR, via claude-code-swe-agent (ADR 0021 -- Skill
  # delegates straight to the Agent CR, no Tool wrapper needed). Moved off
  # opencode-swe-agent (now disabled above) onto the Claude Code engine.
  selfImprovement:
    enabled: true
    agentRef: claude-code-swe-agent
  # Requires webSearch.enabled=true above.
  webSearch:
    enabled: true

integrationRoutes:
  # github-issue-labeled-triage (ADR 0024): applying integration-gateway's
  # configured trigger label (charts/agent-controller/values-production.yaml's
  # integrationGateway.config.githubTriggerLabel, "ai-triage") to a GitHub
  # issue dispatches deterministically to the agentRef below, bypassing RAG
  # skill retrieval. A label, not an assignee -- GitHub App bot users
  # generally cannot be set as issue assignees, so `issues.assigned` (this
  # route's original trigger) never fired in practice.
  #
  # agentRef is claude-code-swe-agent: triage now runs on the Claude Code
  # engine (claudeCodeSweAgent.enabled=true above), replacing the disabled
  # opencode-swe-agent. Because that agent's identityLink.providers is
  # ["claude"], the issue's sender must have a linked Claude token for a
  # triage run to launch -- the same per-user gate the whole ai-triage path
  # already uses (agent-controller values' claudeAuth.enabled).
  #
  # Requires claudeCodeSweAgent.enabled=true (set above) and the
  # IntegrationRoute CRD to exist on the cluster -- `helm upgrade` does NOT
  # install/update CRDs for an existing release
  # (charts/agent-controller/charts/core-controller/crds/README.md), so this
  # was applied manually once:
  #   kubectl apply -f controllers/core-controller/config/crd/bases/core.controller-agent.dev_integrationroutes.yaml
  githubIssueLabeledTriage:
    enabled: true
    agentRef: claude-code-swe-agent
  # github-pr-labeled-review: applying integration-gateway's configured review
  # label (charts/agent-controller/values-production.yaml's
  # integrationGateway.config.githubReviewLabel, "ai-review") to a PR
  # dispatches deterministically to the agentRef below, bypassing RAG skill
  # retrieval. A human applies the label -- the gateway drops bot-authored
  # events, so the agent that opened the PR can't review its own work; a
  # maintainer requests the review by labeling the PR.
  #
  # agentRef is claude-code-swe-agent (same engine as triage above). Because
  # that agent's identityLink.providers is ["claude"], the person who applied
  # the label must have a linked Claude token for the review to launch -- the
  # same per-user gate the ai-triage path already uses.
  #
  # Requires claudeCodeSweAgent.enabled=true (set above) and the
  # IntegrationRoute CRD to exist on the cluster -- `helm upgrade` does NOT
  # install/update CRDs for an existing release, so if it isn't already
  # present it must be applied manually once:
  #   kubectl apply -f controllers/core-controller/config/crd/bases/core.controller-agent.dev_integrationroutes.yaml
  githubPrLabeledReview:
    enabled: true
    agentRef: claude-code-swe-agent
