# values-production.yaml — Tool/Skill/Agent catalog on the homelab cluster
# (namespace controller-agent). Consumed automatically by
# .github/workflows/deploy.yml on every push to main; formerly lived as
# values-community-components.yaml in the private imaustink/homelab repo and
# was fetched cross-repo via a GitHub App token on every deploy -- moved here
# to drop that indirection now that nothing in this file is a real secret.
#
# First-time manual install AFTER agent-controller (its CRs need the CRDs
# that chart installs):
#
#   helm install community-components charts/community-components -n controller-agent \
#     -f charts/community-components/values-production.yaml

enabled: true

crdApiVersion: core.controller-agent.dev/v1alpha1

# Chart now templates recipe-scraper/recipe-publisher/opencode-swe-agent/
# web-search's ServiceAccounts itself (serviceAccount.create default true per
# component) — this is what actually attaches the private-registry pull
# secret to them.
imagePullSecrets:
  - name: docker-registry-credentials

recipeScraper:
  enabled: true
  image: registry.kurpuis.com:5000/recipe-scraper:latest
  serviceAccountName: recipe-scraper
  openai:
    secretName: agent-orchestrator-secrets
    secretKey: OPENAI_API_KEY

# web-search: queries the in-cluster SearXNG instance (agent-controller
# chart's searxng.enabled=true — values-production.yaml). Default
# searxngBaseUrl already matches that release's name ("agent-controller").
webSearch:
  enabled: true
  image: registry.kurpuis.com:5000/web-search:latest
  serviceAccountName: web-search

# web-fetch: fetches a single URL and returns its main readable content as
# Markdown. Required alongside webSearch above — the web-search skill's
# toolRefs lists both tools, and its derived audience (ADR 0011) is empty
# without this one. No external dependency (SSRF-guarded).
webFetch:
  enabled: true
  image: registry.kurpuis.com:5000/web-fetch:latest
  serviceAccountName: web-fetch

# kubectl-readonly: cluster debugging tool. Grants its ServiceAccount a
# cluster-wide read-only ClusterRole (see
# charts/community-components/templates/clusterrole-kubectl-readonly.yaml),
# including get/list/watch on Secrets -- the tool's own code (not RBAC) is
# what keeps values out of its output. See tools/kubectl-readonly/README.md
# before flipping this off elsewhere if that trade-off isn't acceptable.
kubectlReadonly:
  enabled: true
  image: registry.kurpuis.com:5000/kubectl-readonly:latest
  serviceAccountName: kubectl-readonly

recipePublisher:
  enabled: true
  image: registry.kurpuis.com:5000/recipe-publisher:latest
  serviceAccountName: recipe-publisher
  mealieBaseUrl: "https://recipes.kurpuis.com"
  ingredientParser: "nlp"
  # Create first:
  #   kubectl create secret generic recipe-publisher-secrets -n controller-agent \
  #     --from-literal=MEALIE_API_TOKEN=<token>
  secretName: recipe-publisher-secrets
  secretKey: MEALIE_API_TOKEN

# opencode-swe-agent: privileged GitHub coding sub-agent. Cut over from
# PAT-only (Phase A) to per-user GitHub identity linking (docs/adr/0022,
# Phase B) -- the opencode-swe-secrets GITHUB_TOKEN key is retired as part
# of this cutover; ANTHROPIC_API_KEY remains PAT-based.
opencodeSweAgent:
  enabled: true
  image: registry.kurpuis.com:5000/opencode-swe-agent:latest
  serviceAccountName: opencode-swe-agent
  secretName: opencode-swe-secrets
  secretKey: GITHUB_TOKEN
  anthropicSecretKey: ANTHROPIC_API_KEY
  # Dual-token pattern (docs/adr/0022 update): the same GitHub App used by
  # integration-gateway for identity-link now also backs installation-token
  # writes here. Copied (not cross-referenced) into opencode-swe-secrets
  # from integration-gateway-secrets so this chart doesn't depend on that
  # one's secret name.
  githubAppIdSecretKey: GITHUB_APP_ID
  githubAppPrivateKeySecretKey: GITHUB_APP_PRIVATE_KEY
  githubAppInstallationIdSecretKey: GITHUB_APP_INSTALLATION_ID
  githubAppSlug: k5s-bot
  # Per-user GitHub identity linking (docs/adr/0022) -- agent-orchestrator/
  # integration-gateway's identityLink.enabled are already on (see
  # charts/agent-controller/values-production.yaml). Flipping this breaks
  # every opencode-swe-agent request for every caller until they complete
  # the device-flow link. Now that the App creds above are also set, this
  # unlocks the dual-token pattern rather than pure per-user-token writes.
  identityLink:
    enabled: true
    providers:
      - github

# github: single allowlisted gh CLI command tool (issue/pr/repo/release/
# search/workflow/run), authenticated as the calling user's own linked
# GitHub identity (ADR 0022/0027) -- reuses the exact same identity-link
# plumbing already enabled for opencodeSweAgent above (agent-orchestrator's
# and integration-gateway's identityLink.enabled, see
# charts/agent-controller/values-production.yaml), no new gateway/App
# configuration needed. Lighter-weight than delegating to opencode-swe-agent
# for a quick, targeted GitHub read/write that doesn't need a clone or code
# change.
githubTool:
  enabled: true
  image: registry.kurpuis.com:5000/github:latest
  serviceAccountName: github-tool
  identityLink:
    enabled: true
    providers:
      - github

skills:
  recipeRefining:
    enabled: true
  # self-improvement: drafts a new Skill/Tool CR from a successful ad-hoc
  # turn and opens a PR, via opencode-swe-agent above (ADR 0021 -- Skill
  # delegates straight to the Agent CR, no Tool wrapper needed).
  selfImprovement:
    enabled: true
  # Requires webSearch.enabled=true above.
  webSearch:
    enabled: true

integrationRoutes:
  # github-issue-labeled-triage (ADR 0024): applying integration-gateway's
  # configured trigger label (charts/agent-controller/values-production.yaml's
  # integrationGateway.config.githubTriggerLabel, "ai-triage") to a GitHub
  # issue dispatches deterministically to opencode-swe-agent above, bypassing
  # RAG skill retrieval. A label, not an assignee -- GitHub App bot users
  # generally cannot be set as issue assignees, so `issues.assigned` (this
  # route's original trigger) never fired in practice. Requires
  # opencodeSweAgent.enabled=true (already set above) and the
  # IntegrationRoute CRD to exist on the cluster -- `helm upgrade` does NOT
  # install/update CRDs for an existing release
  # (charts/agent-controller/charts/core-controller/crds/README.md), so this
  # was applied manually once:
  #   kubectl apply -f controllers/core-controller/config/crd/bases/core.controller-agent.dev_integrationroutes.yaml
  githubIssueLabeledTriage:
    enabled: true
