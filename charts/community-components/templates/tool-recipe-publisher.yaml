{{- if .Values.recipePublisher.enabled }}
apiVersion: {{ .Values.crdApiVersion }}
kind: Tool
metadata:
  name: recipe-publisher
  labels:
    {{- include "tools.labels" . | nindent 4 }}
spec:
  description: >-
    Publishes (or updates) a finalized recipe on a Mealie instance: creates
    the recipe by name, then fills in the parsed ingredients, instructions,
    equipment, tips, and source URL. If the input Markdown is prefixed with a
    `<!-- mealie-slug: <slug> -->` marker (from a previous publish of the same
    recipe), updates that recipe in place instead of creating a new one. The
    target Mealie instance is fixed via this tool's own configuration, never
    taken from the caller's input.
  input: >-
    A full recipe as Markdown text (the same format recipe-scraper produces),
    serialized as a single string, optionally prefixed with a
    `<!-- mealie-slug: <slug> -->` marker to update that existing recipe
    instead of creating a new one.
  output: >-
    The published/updated recipe Markdown, prefixed with a `mealie-slug`
    marker for follow-up updates and followed by a Mealie link, or a failed
    event if the recipe could not be created/updated.
  # This tool WRITES (creates/updates recipes in Mealie), so it requires the
  # writer role -- note this makes the recipe-refining-skill writer-only, since
  # a skill's audience is the intersection of its tools' roles (ADR 0011).
  allowedRoles:
    - writer
  tier: standard
  image: {{ .Values.recipePublisher.image | quote }}
  serviceAccountName: {{ .Values.recipePublisher.serviceAccountName | quote }}
  env:
    - name: MEALIE_BASE_URL
      value: {{ .Values.recipePublisher.mealieBaseUrl | quote }}
    # Which of Mealie's registered ingredient parsers to use (nlp | brute |
    # openai) -- "nlp" works out of the box; "openai" needs an AI Provider
    # configured in Mealie's own Settings.
    - name: MEALIE_INGREDIENT_PARSER
      value: {{ .Values.recipePublisher.ingredientParser | quote }}
  secretEnv:
    - name: MEALIE_API_TOKEN
      secretRef:
        name: {{ .Values.recipePublisher.secretName | quote }}
        key: {{ .Values.recipePublisher.secretKey | quote }}
{{- end }}
