{{- if .Values.recipeScraper.enabled }}
apiVersion: {{ .Values.crdApiVersion }}
kind: Tool
metadata:
  name: recipe-scraper
  labels:
    {{- include "tools.labels" . | nindent 4 }}
spec:
  description: >-
    Scrapes and normalizes a recipe from a URL. Supports web pages,
    YouTube/video URLs (via transcription), and image URLs (via OCR).
    Guards against SSRF on the target URL and treats all fetched content as
    untrusted.
  input: A single recipe URL as a plain string (web page, video, or image).
  output: >-
    A recipe rendered as Markdown: a `# Title` heading, `## Ingredients` and
    `## Directions` sections (each split into `###` subsections for
    multi-component recipes, e.g. a topping made separately from the main
    dish), `## Equipment`, `## Tips`, and a `[Source](<url>)` link at the
    end. See docs/messaging.md for the full event contract.
  # Read-only extraction -- safe for both roles. Keeping writer here also keeps
  # the recipe-refining-skill's derived audience (scraper ∩ publisher, ADR 0011)
  # non-empty now that recipe-publisher is writer-only.
  allowedRoles:
    - reader
    - writer
  tier: standard
  image: {{ .Values.recipeScraper.image | quote }}
  serviceAccountName: {{ .Values.recipeScraper.serviceAccountName | quote }}
  secretEnv:
    - name: OPENAI_API_KEY
      secretRef:
        name: {{ .Values.recipeScraper.openai.secretName | quote }}
        key: {{ .Values.recipeScraper.openai.secretKey | quote }}
{{- end }}
