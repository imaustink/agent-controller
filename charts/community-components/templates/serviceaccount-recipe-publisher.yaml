{{- if and .Values.recipePublisher.enabled .Values.recipePublisher.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.recipePublisher.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tools.labels" . | nindent 4 }}
  {{- with .Values.recipePublisher.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.recipePublisher.serviceAccount.automount }}
{{- end }}
