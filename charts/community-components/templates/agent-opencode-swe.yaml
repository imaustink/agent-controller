{{- if .Values.opencodeSweAgent.enabled }}
apiVersion: {{ .Values.crdApiVersion }}
kind: Agent
metadata:
  name: opencode-swe-agent
  labels:
    {{- include "tools.labels" . | nindent 4 }}
spec:
  description: >-
    Performs software-engineering work on GitHub end-to-end. Runs the
    opencode coding-agent CLI — which has bash, file-read, grep, and glob
    tools — plus the git and gh (GitHub CLI) command-line tools, so it can
    clone, browse, and read any repository's files and history, not only
    write to them. That means it covers both: (1) read-only questions
    about what is actually in a repository, e.g. "how many levels does my
    lander game have, check GitHub" or "what does this repo's config
    say" — it clones/inspects the repo and answers directly, no code
    change required; and (2) changes — creating or cloning repositories,
    implementing features and fixes, writing code and tests, and opening
    or updating pull requests. Handles multi-turn refinement and supports
    human-in-the-loop clarifying questions when the task needs more
    context before it can proceed.
  input: >-
    A natural-language software-engineering instruction or question about
    a GitHub repository's contents (e.g. "create a repo called hello-svc
    with a Node HTTP server and open a PR", or "how many levels does my
    lander-game repo have?"), or a follow-up refinement instruction for a
    session that is already in progress.
  output: >-
    A summary of the changes plus a link to the opened/updated pull
    request when the task changed code; a direct answer when the task
    was only a question about a repository's contents; or a mid-turn
    clarifying question to the user if more context is needed before
    work can begin.
  allowedRoles:
    - writer
  tier: privileged
  image: {{ .Values.opencodeSweAgent.image }}
  serviceAccountName: {{ .Values.opencodeSweAgent.serviceAccountName }}
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
      ephemeral-storage: "2Gi"
    limits:
      cpu: "2"
      memory: "2Gi"
      ephemeral-storage: "8Gi"
  orchestratorPrompt: |
    Delegate to this agent for any software-engineering request AND for any
    question that requires actually looking at a GitHub repository's
    contents to answer — it has git/gh CLIs plus file read/search tools, so
    it can clone and inspect a repo instead of guessing. This covers both:
    creating or cloning repositories, implementing features, fixing bugs,
    writing tests, and opening or updating pull requests; and answering
    read-only questions about what is in a repo (e.g. "how many levels
    does my lander game have, check GitHub" or "what does this repo's
    README say").

    Pass the user's request verbatim as the goal. Continuing a pull request
    across separate turns needs no special handling from you: the
    orchestrator itself carries the repo/branch/PR/session forward
    server-side (docs/adr/0017) and prepends it to the goal automatically
    whenever this agent already has one in progress for the conversation.

    The agent may pause mid-task to ask you a clarifying question (a
    non-final reply in the chat). Answer naturally; the conversation
    will resume automatically.
  agentPrompt: |
    You are a software-engineering sub-agent. Using the opencode CLI
    (Claude Sonnet 5 via the Anthropic API, with its bash/file-read/grep/
    glob tools) and the gh/git CLIs, satisfy the request: implement the
    requested coding task and return a summary and PR link, or, if it's a
    read-only question about a repository's contents, clone or inspect it
    with git/gh and answer directly — no commit or PR is needed unless the
    task actually calls for a change. Only ask the user a question if you
    genuinely cannot proceed without their answer; otherwise use sensible
    defaults. Never perform irreversible operations (force-push, delete
    branches/repos).
  secretEnv:
    - name: GITHUB_TOKEN
      secretRef:
        name: {{ .Values.opencodeSweAgent.secretName }}
        key: {{ .Values.opencodeSweAgent.secretKey }}
    - name: ANTHROPIC_API_KEY
      secretRef:
        name: {{ .Values.opencodeSweAgent.secretName }}
        key: {{ .Values.opencodeSweAgent.anthropicSecretKey }}
    {{- if .Values.opencodeSweAgent.githubAppIdSecretKey }}
    - name: GITHUB_APP_ID
      secretRef:
        name: {{ .Values.opencodeSweAgent.secretName }}
        key: {{ .Values.opencodeSweAgent.githubAppIdSecretKey }}
    {{- end }}
    {{- if .Values.opencodeSweAgent.githubAppPrivateKeySecretKey }}
    - name: GITHUB_APP_PRIVATE_KEY
      secretRef:
        name: {{ .Values.opencodeSweAgent.secretName }}
        key: {{ .Values.opencodeSweAgent.githubAppPrivateKeySecretKey }}
    {{- end }}
    {{- if .Values.opencodeSweAgent.githubAppInstallationIdSecretKey }}
    - name: GITHUB_APP_INSTALLATION_ID
      secretRef:
        name: {{ .Values.opencodeSweAgent.secretName }}
        key: {{ .Values.opencodeSweAgent.githubAppInstallationIdSecretKey }}
    {{- end }}
{{- end }}
