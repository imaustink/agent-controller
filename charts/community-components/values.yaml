# The community Tool/Skill/Agent catalog custom resources. Each entry can be
# toggled off.
#
# These are normal Helm-managed resources -- install this chart AFTER the
# agent-controller chart (which owns the Tool/Skill/Agent/ToolRun/AgentRun/
# LocalTool CRDs, from charts/agent-controller/charts/core-controller/crds/).
# `helm uninstall` on this release cleanly removes every CR it created.

enabled: true

# apiVersion of the Tool/Skill/Agent CRDs. Must match what the agent-controller
# chart's core-controller subchart installs (config.crdGroup/crdVersion on the
# orchestrator side too).
crdApiVersion: core.controller-agent.dev/v1alpha1

# Image pull secrets attached to every ServiceAccount this chart creates
# (recipe-scraper, web-search, recipe-publisher, opencode-swe-agent), so Tool/
# Agent pods running as those ServiceAccounts can pull from a private
# registry. Each entry must reference a `kubernetes.io/dockerconfigjson`
# Secret that already exists in this namespace, e.g.:
#   kubectl -n <ns> create secret docker-registry docker-registry-credentials \
#     --docker-server=registry.example.com \
#     --docker-username=... --docker-password=...
imagePullSecrets: []
# imagePullSecrets:
#   - name: docker-registry-credentials

# recipe-scraper: read-only URL -> recipe Markdown extraction.
recipeScraper:
  enabled: true
  image: recipe-scraper:latest
  serviceAccountName: recipe-scraper
  # Creates the ServiceAccount named above. Set to false and pre-create it
  # yourself if you need annotations managed elsewhere (e.g. IRSA) that this
  # chart doesn't own.
  serviceAccount:
    create: true
    annotations: {}
    automount: true
  # Secret (must already exist) supplying the tool's OPENAI_API_KEY.
  openai:
    secretName: agent-orchestrator-secrets
    secretKey: OPENAI_API_KEY

# web-search: queries an in-cluster SearXNG instance for web results.
# Requires the agent-controller release's `searxng.enabled=true` (see that
# chart's values.yaml) -- searxngBaseUrl below must point at its Service.
webSearch:
  enabled: false
  image: web-search:latest
  serviceAccountName: web-search
  # Creates the ServiceAccount named above. Set to false and pre-create it
  # yourself if you need to attach annotations managed elsewhere (e.g. IRSA)
  # that this chart doesn't own.
  serviceAccount:
    create: true
    annotations: {}
    automount: true
  # Not a secret -- <agent-controller release name>-searxng, ClusterIP,
  # same namespace as this release. Defaults to the minikube demo release
  # name; override to match your own agent-controller release name.
  searxngBaseUrl: "http://agent-controller-searxng:8080"

# web-fetch: fetches a single URL and returns its main readable content as
# Markdown. Pairs with web-search above -- the search tool only returns short
# snippets, so the web-search-skill calls this tool on a result's URL to
# actually read the page. SSRF-guarded; no other configuration needed.
webFetch:
  enabled: false
  image: web-fetch:latest
  serviceAccountName: web-fetch

# recipe-publisher: publishes/updates a recipe on a Mealie instance.
recipePublisher:
  enabled: true
  image: recipe-publisher:latest
  serviceAccountName: recipe-publisher
  # Creates the ServiceAccount named above. Set to false and pre-create it
  # yourself if you need annotations managed elsewhere (e.g. IRSA) that this
  # chart doesn't own.
  serviceAccount:
    create: true
    annotations: {}
    automount: true
  # Target Mealie instance (not a secret) + which ingredient parser to use.
  # No default on purpose -- must be set to your own Mealie instance, never
  # inherited from this repo's demo config.
  mealieBaseUrl: ""
  ingredientParser: "nlp"
  # Secret (must already exist) supplying MEALIE_API_TOKEN.
  secretName: recipe-publisher-secrets
  secretKey: MEALIE_API_TOKEN

# opencode-swe-agent: Agent-SDK software-engineering sub-agent (bidirectional
# NATS, HITL) that runs the opencode CLI against Anthropic's API directly
# (Claude Sonnet 5).
#
# Three mutually-exclusive ways to give it a GitHub credential:
#   1. GITHUB_TOKEN PAT (default) -- prerequisite (out-of-band -- Helm can't
#      source secret values on its own):
#        kubectl -n <ns> create secret generic opencode-swe-secrets \
#          --from-literal=GITHUB_TOKEN=github_pat_... \
#          --from-literal=ANTHROPIC_API_KEY=sk-ant-...
#   2. GitHub App installation-token auth (ADR 0018) -- see the three
#      githubApp*SecretKey fields below.
#   3. Per-user identity linking (ADR 0022, identityLink block below) -- no
#      static GitHub credential is baked into this Agent's template at all;
#      agent-orchestrator resolves and injects the CALLING USER's own linked
#      GitHub token per-run instead. Requires agent-orchestrator's own
#      identityLink.enabled=true and a configured integration-gateway (see
#      those charts' values.yaml).
opencodeSweAgent:
  enabled: false
  image: opencode-swe-agent:latest
  serviceAccountName: opencode-swe-agent
  # Creates the ServiceAccount named above. Set to false and pre-create it
  # yourself if you need annotations managed elsewhere (e.g. IRSA) that this
  # chart doesn't own.
  serviceAccount:
    create: true
    annotations: {}
    automount: true
  # Two independent secrets in one k8s Secret: a fine-grained GitHub PAT for
  # git/gh operations, and an Anthropic API key for the opencode model.
  secretName: opencode-swe-secrets
  secretKey: GITHUB_TOKEN
  anthropicSecretKey: ANTHROPIC_API_KEY
  # Optional (ADR 0018): GitHub App installation-token auth, preferred over
  # the GITHUB_TOKEN PAT above when all three keys below are set (a partial
  # set is rejected by the agent, not silently ignored). Leave all three
  # empty (the default) to keep using the PAT -- no behavior change.
  #   kubectl -n <ns> create secret generic opencode-swe-secrets \
  #     --from-literal=GITHUB_APP_ID=... \
  #     --from-literal=GITHUB_APP_PRIVATE_KEY="$(cat app-key.pem)" \
  #     --from-literal=GITHUB_APP_INSTALLATION_ID=... \
  #     --from-literal=ANTHROPIC_API_KEY=sk-ant-...
  githubAppIdSecretKey: ""
  githubAppPrivateKeySecretKey: ""
  githubAppInstallationIdSecretKey: ""
  # Per-user GitHub identity linking (docs/adr/0022): when enabled, this
  # agent no longer uses a shared GITHUB_TOKEN/App-installation credential
  # at all -- agent-orchestrator resolves and injects the CALLING USER's
  # own linked GitHub token per-run instead (requires agent-orchestrator's
  # own identityLink.enabled=true and a configured integration-gateway,
  # see those charts). Leave disabled (default) to keep today's shared-
  # credential behavior (GITHUB_TOKEN PAT or GitHub App installation token)
  # unchanged.
  identityLink:
    enabled: false
    providers:
      - github

skills:
  # recipe-refining: extract -> confirm -> publish -> refine (recipe-scraper +
  # recipe-publisher). Enable both those tools above for its derived audience
  # (ADR 0011) to be non-empty.
  recipeRefining:
    enabled: true
  # self-improvement: drafts a new Skill/Tool CR from a successful fallback
  # turn (graph.ts's selectDelegate fallback) and opens a PR against
  # imaustink/agent-controller by delegating straight to the opencode-swe-agent
  # Agent CR (ADR 0021 -- no Tool wrapper needed). Requires
  # opencodeSweAgent.enabled=true for its derived audience to be non-empty.
  selfImprovement:
    enabled: false
  # web-search: answers a request using an in-cluster SearXNG search, and can
  # follow up with web-fetch to read a promising result's full page (see
  # webSearch and webFetch Tools above). Enable both webSearch.enabled=true
  # and webFetch.enabled=true for its derived audience (ADR 0011) to be
  # non-empty -- the skill's toolRefs lists both.
  webSearch:
    enabled: false
