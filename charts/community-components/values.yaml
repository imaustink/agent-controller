# The community Tool/Skill/Agent catalog custom resources. Each entry can be
# toggled off.
#
# These are normal Helm-managed resources -- install this chart AFTER the
# agent-controller chart (which owns the Tool/Skill/Agent/ToolRun/AgentRun/
# LocalTool CRDs, from charts/agent-controller/charts/core-controller/crds/).
# `helm uninstall` on this release cleanly removes every CR it created.

enabled: true

# apiVersion of the Tool/Skill/Agent CRDs. Must match what the agent-controller
# chart's core-controller subchart installs (config.crdGroup/crdVersion on the
# orchestrator side too).
crdApiVersion: core.controller-agent.dev/v1alpha1

# Image pull secrets attached to every ServiceAccount this chart creates
# (recipe-scraper, web-search, recipe-publisher, opencode-swe-agent), so Tool/
# Agent pods running as those ServiceAccounts can pull from a private
# registry. Each entry must reference a `kubernetes.io/dockerconfigjson`
# Secret that already exists in this namespace, e.g.:
#   kubectl -n <ns> create secret docker-registry docker-registry-credentials \
#     --docker-server=registry.example.com \
#     --docker-username=... --docker-password=...
imagePullSecrets: []
# imagePullSecrets:
#   - name: docker-registry-credentials

# recipe-scraper: read-only URL -> recipe Markdown extraction.
recipeScraper:
  enabled: true
  image: recipe-scraper:latest
  serviceAccountName: recipe-scraper
  # Creates the ServiceAccount named above. Set to false and pre-create it
  # yourself if you need annotations managed elsewhere (e.g. IRSA) that this
  # chart doesn't own.
  serviceAccount:
    create: true
    annotations: {}
    automount: true
  # Secret (must already exist) supplying the tool's OPENAI_API_KEY.
  openai:
    secretName: agent-orchestrator-secrets
    secretKey: OPENAI_API_KEY

# web-search: queries an in-cluster SearXNG instance for web results.
# Requires the agent-controller release's `searxng.enabled=true` (see that
# chart's values.yaml) -- searxngBaseUrl below must point at its Service.
webSearch:
  enabled: false
  image: web-search:latest
  serviceAccountName: web-search
  # Creates the ServiceAccount named above. Set to false and pre-create it
  # yourself if you need to attach annotations managed elsewhere (e.g. IRSA)
  # that this chart doesn't own.
  serviceAccount:
    create: true
    annotations: {}
    automount: true
  # Not a secret -- <agent-controller release name>-searxng, ClusterIP,
  # same namespace as this release. Defaults to the minikube demo release
  # name; override to match your own agent-controller release name.
  searxngBaseUrl: "http://agent-controller-searxng:8080"

# web-fetch: fetches a single URL and returns its main readable content as
# Markdown. Pairs with web-search above -- the search tool only returns short
# snippets, so the web-search-skill calls this tool on a result's URL to
# actually read the page. SSRF-guarded; no other configuration needed.
webFetch:
  enabled: false
  image: web-fetch:latest
  serviceAccountName: web-fetch
  # Creates the ServiceAccount named above. Set to false and pre-create it
  # yourself if you need to attach annotations managed elsewhere (e.g. IRSA)
  # that this chart doesn't own.
  serviceAccount:
    create: true
    annotations: {}
    automount: true

# kubectl-readonly: runs a single allowlisted read-only kubectl command
# (get/describe/logs/events/top) for cluster debugging. Disabled by default:
# unlike every other tool in this chart, enabling it grants its
# ServiceAccount a cluster-wide ClusterRole (get/list/watch across a fixed
# resource-kind list, including `secrets` -- see
# tools/kubectl-readonly/README.md's "Secrets: keys and lengths only"
# section for the trade-off that implies before turning this on).
kubectlReadonly:
  enabled: false
  image: kubectl-readonly:latest
  serviceAccountName: kubectl-readonly
  # Creates the ServiceAccount named above. Set to false and pre-create it
  # yourself if you need annotations managed elsewhere (e.g. IRSA) that this
  # chart doesn't own. Note this does NOT gate the ClusterRole/
  # ClusterRoleBinding -- those are always created when kubectlReadonly.enabled
  # is true, regardless of who owns the ServiceAccount.
  serviceAccount:
    create: true
    annotations: {}
    automount: true

# recipe-publisher: publishes/updates a recipe on a Mealie instance.
recipePublisher:
  enabled: true
  image: recipe-publisher:latest
  serviceAccountName: recipe-publisher
  # Creates the ServiceAccount named above. Set to false and pre-create it
  # yourself if you need annotations managed elsewhere (e.g. IRSA) that this
  # chart doesn't own.
  serviceAccount:
    create: true
    annotations: {}
    automount: true
  # Target Mealie instance (not a secret) + which ingredient parser to use.
  # No default on purpose -- must be set to your own Mealie instance, never
  # inherited from this repo's demo config.
  mealieBaseUrl: ""
  ingredientParser: "nlp"
  # Secret (must already exist) supplying MEALIE_API_TOKEN.
  secretName: recipe-publisher-secrets
  secretKey: MEALIE_API_TOKEN

# opencode-swe-agent: Agent-SDK software-engineering sub-agent (bidirectional
# NATS, HITL) that runs the opencode CLI against Anthropic's API directly
# (Claude Sonnet 5).
#
# Three mutually-exclusive ways to give it a GitHub credential:
#   1. GITHUB_TOKEN PAT (default) -- prerequisite (out-of-band -- Helm can't
#      source secret values on its own):
#        kubectl -n <ns> create secret generic opencode-swe-secrets \
#          --from-literal=GITHUB_TOKEN=github_pat_... \
#          --from-literal=ANTHROPIC_API_KEY=sk-ant-...
#   2. GitHub App installation-token auth (ADR 0018) -- see the three
#      githubApp*SecretKey fields below.
#   3. Per-user identity linking (ADR 0022, identityLink block below) -- no
#      static GitHub credential is baked into this Agent's template at all;
#      agent-orchestrator resolves and injects the CALLING USER's own linked
#      GitHub token per-run instead. Requires agent-orchestrator's own
#      identityLink.enabled=true and a configured integration-gateway (see
#      those charts' values.yaml).
opencodeSweAgent:
  enabled: false
  image: opencode-swe-agent:latest
  serviceAccountName: opencode-swe-agent
  # Creates the ServiceAccount named above. Set to false and pre-create it
  # yourself if you need annotations managed elsewhere (e.g. IRSA) that this
  # chart doesn't own.
  serviceAccount:
    create: true
    annotations: {}
    automount: true
  # Two independent secrets in one k8s Secret: a fine-grained GitHub PAT for
  # git/gh operations, and an Anthropic API key for the opencode model.
  secretName: opencode-swe-secrets
  secretKey: GITHUB_TOKEN
  anthropicSecretKey: ANTHROPIC_API_KEY
  # Optional (ADR 0018): GitHub App installation-token auth, preferred over
  # the GITHUB_TOKEN PAT above when all three keys below are set (a partial
  # set is rejected by the agent, not silently ignored). Leave all three
  # empty (the default) to keep using the PAT -- no behavior change.
  #   kubectl -n <ns> create secret generic opencode-swe-secrets \
  #     --from-literal=GITHUB_APP_ID=... \
  #     --from-literal=GITHUB_APP_PRIVATE_KEY="$(cat app-key.pem)" \
  #     --from-literal=GITHUB_APP_INSTALLATION_ID=... \
  #     --from-literal=ANTHROPIC_API_KEY=sk-ant-...
  githubAppIdSecretKey: ""
  githubAppPrivateKeySecretKey: ""
  githubAppInstallationIdSecretKey: ""
  # The App's slug (from its GitHub settings page, e.g. "my-cool-app") --
  # public, not a secret. Only used when identityLink.enabled and a full App
  # configuration are both set (the dual-token pattern below): builds the
  # bot's commit identity directly as "<slug>[bot]" instead of a generic
  # placeholder, since an installation token can't call GET /user to derive
  # it the way a PAT/user token can.
  githubAppSlug: ""
  # Per-user GitHub identity linking (docs/adr/0022, dual-token pattern):
  # when enabled AND a full GitHub App configuration is also set (the three
  # githubApp*SecretKey values above), this agent uses BOTH tokens per turn --
  # the calling user's own linked GitHub token gates whether a write is
  # authorized (does this specific person actually have push access?), while
  # a freshly minted, repo-scoped App installation token performs the actual
  # write, so commits/PRs attribute to the bot rather than the human. If
  # identityLink.enabled is set but the App isn't fully configured, this
  # agent falls back to writing with the user's own token directly (today's
  # single-token behavior). Requires agent-orchestrator's own
  # identityLink.enabled=true and a configured integration-gateway (see
  # those charts). Leave disabled (default) for the shared-credential
  # behavior (GITHUB_TOKEN PAT or GitHub App installation token) unchanged.
  identityLink:
    enabled: false
    providers:
      - github

# claude-code-swe-agent: Agent-SDK software-engineering sub-agent (same job as
# opencodeSweAgent above, different engine) that runs the Claude Code CLI
# headless, one `claude -p` invocation per turn -- no long-lived local server
# to keep resident (unlike opencode-swe-agent since ADR 0026), so continuation
# across turns comes from re-cloning the saved repo/branch rather than a live
# session resume.
#
# GitHub credential: same three mutually-exclusive options as opencodeSweAgent
# above (GITHUB_TOKEN PAT / GitHub App installation token / per-user identity
# linking) -- see that block's comments, unchanged here.
#
# Claude/model credential: exactly one of anthropicSecretKey (metered API-key
# billing) or claudeCodeOAuthTokenSecretKey (a Claude subscription/Enterprise
# seat's long-lived token from `claude setup-token`) must resolve to a real
# secret key -- the Agent CR template fails the chart render if neither is
# set. Prerequisite either way (out-of-band -- Helm can't source secret
# values on its own):
#   kubectl -n <ns> create secret generic claude-code-swe-secrets \
#     --from-literal=GITHUB_TOKEN=github_pat_... \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-...
#   # or, for the OAuth-token option instead of/alongside the API key:
#   #   --from-literal=CLAUDE_CODE_OAUTH_TOKEN=sk-ant-oat01-...
claudeCodeSweAgent:
  enabled: false
  image: claude-code-swe-agent:latest
  serviceAccountName: claude-code-swe-agent
  serviceAccount:
    create: true
    annotations: {}
    automount: true
  secretName: claude-code-swe-secrets
  secretKey: GITHUB_TOKEN
  # At least one of these two must be set (validated at render time).
  anthropicSecretKey: ANTHROPIC_API_KEY
  claudeCodeOAuthTokenSecretKey: ""
  # Optional (ADR 0018): GitHub App installation-token auth, preferred over
  # the GITHUB_TOKEN PAT above when all three keys below are set. Leave all
  # three empty (the default) to keep using the PAT.
  githubAppIdSecretKey: ""
  githubAppPrivateKeySecretKey: ""
  githubAppInstallationIdSecretKey: ""
  githubAppSlug: ""
  # Claude Code model id/alias (e.g. "sonnet", "claude-sonnet-5"). Empty uses
  # the CLI's own default.
  model: ""
  # Per-user identity linking. `providers` may list "github" (docs/adr/0022,
  # same semantics as opencodeSweAgent.identityLink above -- a per-user
  # GitHub token gates/attributes writes) AND/OR "claude" (docs/adr/0027 --
  # a per-user Claude Code OAuth token, from `claude setup-token`, replaces
  # the static anthropicSecretKey/claudeCodeOAuthTokenSecretKey above
  # entirely for THIS agent's launches once linked). Requires
  # agent-orchestrator's own identityLink.enabled=true either way; the
  # "claude" provider additionally requires integration-gateway's
  # claudeAuth.enabled=true (see that chart's values.yaml) -- the `claude`
  # CLI must be present in ITS image for the setup-token PTY flow to work.
  identityLink:
    enabled: false
    providers:
      - github
      # - claude

skills:
  # recipe-refining: extract -> confirm -> publish -> refine (recipe-scraper +
  # recipe-publisher). Enable both those tools above for its derived audience
  # (ADR 0011) to be non-empty.
  recipeRefining:
    enabled: true
  # self-improvement: drafts a new Skill/Tool CR from a successful fallback
  # turn (graph.ts's selectDelegate fallback) and opens a PR against
  # imaustink/agent-controller by delegating straight to a SWE Agent CR
  # (ADR 0021 -- no Tool wrapper needed).
  selfImprovement:
    enabled: false
    # Which SWE Agent CR this skill delegates to. Must name an Agent that is
    # enabled in this same values file (default opencode-swe-agent; set to
    # claude-code-swe-agent to run it on the Claude Code engine instead). The
    # named agent's enabled=true is what makes this skill's derived audience
    # (ADR 0011) non-empty.
    agentRef: opencode-swe-agent
  # web-search: answers a request using an in-cluster SearXNG search, and can
  # follow up with web-fetch to read a promising result's full page (see
  # webSearch and webFetch Tools above). Enable both webSearch.enabled=true
  # and webFetch.enabled=true for its derived audience (ADR 0011) to be
  # non-empty -- the skill's toolRefs lists both.
  webSearch:
    enabled: false

integrationRoutes:
  # github-issue-labeled-triage: an IntegrationRoute CR (docs/adr/0024)
  # dispatching a GitHub `issues`/`labeled` webhook event straight to
  # opencode-swe-agent with a triage prompt, deterministically bypassing RAG
  # skill retrieval -- integration-gateway relays the event once its
  # configured trigger label (integration-gateway's config.githubTriggerLabel)
  # is applied to the issue. A label, not an assignee: GitHub App bot users
  # generally cannot be set as issue assignees.
  githubIssueLabeledTriage:
    enabled: false
    # Which SWE Agent CR handles a labeled issue. Must name an Agent that is
    # enabled in this same values file (default opencode-swe-agent; set to
    # claude-code-swe-agent to triage on the Claude Code engine instead).
    agentRef: opencode-swe-agent
  # github-pr-labeled-review: an IntegrationRoute CR dispatching a GitHub
  # `pull_request`/`labeled` webhook straight to a SWE Agent with a review
  # prompt, bypassing RAG skill retrieval -- integration-gateway relays the
  # event once its configured review label
  # (integration-gateway's config.githubReviewLabel) is applied to a PR. A
  # human applies that label: the gateway drops bot-authored events, so the
  # agent that opened the PR cannot self-trigger a review of its own PR.
  githubPrLabeledReview:
    enabled: false
    # Which SWE Agent CR reviews a labeled PR. Must name an Agent that is
    # enabled in this same values file (default opencode-swe-agent; set to
    # claude-code-swe-agent to review on the Claude Code engine instead).
    agentRef: opencode-swe-agent
