{{- if .Values.copilotSwe.enabled }}
apiVersion: {{ .Values.crdApiVersion }}
kind: Tool
metadata:
  name: copilot-swe
  labels:
    {{- include "tools.labels" . | nindent 4 }}
  annotations:
    {{- include "tools.hookAnnotations" . | nindent 4 }}
spec:
  description: >-
    Performs a software-engineering task on GitHub end-to-end using the
    agentic GitHub Copilot CLI: creates or clones a repository, works on a
    dedicated branch, commits and pushes the changes, and opens (or updates) a
    pull request. Handles multi-turn refinement -- follow-up instructions push
    more commits to the same pull request. Cannot perform irreversible actions
    (no force-push, no branch/repository deletion).
  input: >-
    A natural-language software-engineering instruction serialized as a single
    string (e.g. "create a repo called hello-svc with a Node HTTP server and
    open a PR", or "add a health check endpoint"). May be prefixed with a
    `<!-- swe: repo=owner/name branch=... pr=... session=... -->` marker
    carried forward from a previous turn to continue the same pull request.
  output: >-
    A summary of the changes plus a link to the opened/updated pull request,
    prefixed with an `swe` marker so a follow-up turn can keep refining the
    same PR; or a failed event if no pull request could be produced.
  # This tool WRITES to GitHub, so it requires the writer role. A skill's
  # audience is the intersection of its tools' roles (ADR 0011).
  allowedRoles:
    - writer
  tier: privileged
  image: {{ .Values.copilotSwe.image | quote }}
  serviceAccountName: {{ .Values.copilotSwe.serviceAccountName | quote }}
  # Coding tasks take much longer than the 300s default -- bound at 30 minutes
  # (Tool.spec.timeoutSeconds, honored by the tool-controller as the Job's
  # activeDeadlineSeconds when the ToolRun doesn't override it).
  timeoutSeconds: {{ .Values.copilotSwe.timeoutSeconds }}
  # Privileged tools get a bigger writable workspace + more headroom than the
  # 256Mi recipe tools.
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
      ephemeral-storage: "2Gi"
    limits:
      cpu: "2"
      memory: "2Gi"
      ephemeral-storage: "8Gi"
  env:
    - name: GITHUB_APP_ID
      value: {{ .Values.copilotSwe.githubAppId | quote }}
  secretEnv:
    - name: COPILOT_GITHUB_TOKEN
      secretRef:
        name: {{ .Values.copilotSwe.secretName | quote }}
        key: COPILOT_GITHUB_TOKEN
    - name: GITHUB_APP_PRIVATE_KEY
      secretRef:
        name: {{ .Values.copilotSwe.secretName | quote }}
        key: GITHUB_APP_PRIVATE_KEY
{{- end }}
