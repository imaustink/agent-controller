# The Tool + Skill catalog custom resources. Each entry can be toggled off.
#
# These are applied as post-install/post-upgrade Helm hooks so they land after
# the tool-controller Deployment is created (their CRDs are installed first,
# from charts/tool-controller/crds/, before any templated resource in the
# release). Because they are hooks, `helm uninstall` will NOT delete them --
# remove them by hand (`kubectl delete tool,skill -l ...`) or delete the CRDs
# if you want them gone. See templates/_helpers.tpl for the hook annotations.

enabled: true

# apiVersion of the Tool/Skill CRDs. Must match what charts/tool-controller
# installs (config.crdGroup/crdVersion on the orchestrator side too).
crdApiVersion: core.controller-agent.dev/v1alpha1

# Base Helm hook weight for the catalog CRs. Higher = applied later; kept
# positive so they run after the (unweighted, weight 0) controller resources.
hookWeight: 5

# recipe-scraper: read-only URL -> recipe Markdown extraction.
recipeScraper:
  enabled: true
  image: recipe-scraper:latest
  serviceAccountName: recipe-scraper
  # Secret (must already exist) supplying the tool's OPENAI_API_KEY.
  openai:
    secretName: agent-orchestrator-secrets
    secretKey: OPENAI_API_KEY

# recipe-publisher: publishes/updates a recipe on a Mealie instance.
recipePublisher:
  enabled: true
  image: recipe-publisher:latest
  serviceAccountName: recipe-publisher
  # Target Mealie instance (not a secret) + which ingredient parser to use.
  mealieBaseUrl: "https://recipes.kurpuis.com"
  ingredientParser: "nlp"
  # Secret (must already exist) supplying MEALIE_API_TOKEN.
  secretName: recipe-publisher-secrets
  secretKey: MEALIE_API_TOKEN

# opencode-swe-agent: Agent-SDK software-engineering sub-agent (bidirectional
# NATS, HITL) that runs the opencode CLI against Anthropic's API directly
# (Claude Sonnet 5) instead of GitHub Copilot. Replaces the old copilotSwe
# Tool + softwareEngineering Skill when enabled.
# Prerequisites (out-of-band):
#   kubectl -n <ns> create serviceaccount opencode-swe-agent
#   kubectl -n <ns> create secret generic opencode-swe-secrets \
#     --from-literal=GITHUB_TOKEN=github_pat_... \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-...
opencodeSweAgent:
  enabled: false
  image: opencode-swe-agent:latest
  serviceAccountName: opencode-swe-agent
  # Two independent secrets in one k8s Secret: a fine-grained GitHub PAT for
  # git/gh operations, and an Anthropic API key for the opencode model.
  secretName: opencode-swe-secrets
  secretKey: GITHUB_TOKEN
  anthropicSecretKey: ANTHROPIC_API_KEY

# opencode-swe-agent-tool: an agent-backed Tool (spec.agentRef) wrapping the
# opencodeSweAgent Agent CR above, so a Skill's toolRefs can delegate to it
# via the ordinary tool-call path (self-improvement-skill below). Requires
# opencodeSweAgent.enabled=true.
opencodeSweAgentTool:
  enabled: false

skills:
  # recipe-refining: extract -> confirm -> publish -> refine (recipe-scraper +
  # recipe-publisher). Enable both those tools above for its derived audience
  # (ADR 0011) to be non-empty.
  recipeRefining:
    enabled: true
  # software-engineering: SUPERSEDED by opencodeSweAgent Agent CR above.
  # Keep disabled when opencodeSweAgent.enabled=true.
  softwareEngineering:
    enabled: false
  # self-improvement: drafts a new Skill/Tool CR from a successful fallback
  # turn (graph.ts's selectDelegate fallback) and opens a PR against
  # imaustink/agent-controller via opencode-swe-agent-tool. Requires
  # opencodeSweAgentTool.enabled=true for its derived audience to be non-empty.
  selfImprovement:
    enabled: false
