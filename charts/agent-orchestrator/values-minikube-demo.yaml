# Values file for the local minikube demo deployment of the `agent-orchestrator`
# release (namespace `recipe-agent`). Captures every override that's been
# applied via one-off `--set` flags across this deployment's history so
# future `helm upgrade`s don't accidentally drop them.
#
# IMPORTANT LESSON (hit for real in this deployment): `helm upgrade` with
# only a FEW `--set` flags and no `-f`/`--reuse-values` REPLACES the entire
# computed values tree with just those flags layered on the chart's bare
# defaults -- it does NOT merge with whatever the previous revision had.
# That silently reverted image.tag/qdrant.enabled/secrets.existingSecret/
# openwebui.openaiApiKey/config.staticIdentities to their chart defaults one
# time, which broke image pulls (defaulted to the unbuilt `:0.1.0` tag),
# deleted the bundled Qdrant StatefulSet (PVC survived, no data lost, but the
# pod did), and broke orchestrator auth. Always upgrade with:
#   helm upgrade agent-orchestrator charts/agent-orchestrator -n recipe-agent -f charts/agent-orchestrator/values-minikube-demo.yaml
# (edit this file first for any new setting, then run the same command --
# never hand-assemble a fresh pile of `--set` flags from memory).
#
# Not committed as chart defaults (values.yaml) because these are
# demo/environment-specific: an exact minikube-local-build image tag, this
# specific Google OAuth client id, this specific dev bearer token, etc.

image:
  tag: latest

qdrant:
  enabled: true

secrets:
  existingSecret: agent-orchestrator-secrets

# DEV/TEST ONLY (see values.yaml's own warning + NOTES.txt) -- maps the
# Open WebUI bearer token below to a "reader" identity so the
# StaticIdentityResolver stub accepts it.
config:
  staticIdentities: '{"openwebui-dev-token":{"subject":"open-webui","roles":["reader"]}}'

openwebui:
  enabled: true
  # Must match a key in config.staticIdentities above.
  openaiApiKey: openwebui-dev-token
  # Forward X-OpenWebUI-Chat-Id (and user info) headers to the orchestrator
  # on every upstream request -- this is what keys the orchestrator's
  # session-scoped active-skill continuity (ADR 0012). Without it every
  # turn falls back to stateless skill re-selection (works, just slower and
  # weaker on short follow-up messages).
  extraEnvVars:
    - name: GOOGLE_REDIRECT_URI
      value: "http://localhost:8080/oauth/google/login/callback"
    - name: ENABLE_FORWARD_USER_INFO_HEADERS
      value: "true"
  sso:
    enabled: true
    google:
      enabled: true
      clientId: 916932714292-6900thjm1dq3e4fnqrcj3ipe4iud70o8.apps.googleusercontent.com
      # Secret created out-of-band (never via --set/chat):
      #   kubectl create secret generic agent-orchestrator-openwebui-google-oauth \
      #     -n recipe-agent --from-literal=client-secret=<GOOGLE_CLIENT_SECRET>
      clientExistingSecret: agent-orchestrator-openwebui-google-oauth
