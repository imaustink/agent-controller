replicaCount: 1

image:
  repository: agent-orchestrator
  # Defaults to .Chart.AppVersion if empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Creates the ServiceAccount the orchestrator runs as (see rbac.create
  # below for the permissions bound to it: read the Tool/Skill CRD catalog,
  # create/watch/delete ToolRun CRs -- it never talks to batch/jobs
  # directly, that's charts/tool-controller's job, ADR 0010).
  create: true
  annotations: {}
  name: ""
  automount: true

rbac:
  # Namespace-scoped Role + RoleBinding (never a ClusterRole — the
  # orchestrator only needs to read the Tool/Skill catalog and manage
  # ToolRun CRs in one namespace, see docs/orchestrator.md and ADR 0010).
  create: true

# Namespace the orchestrator discovers Tool/Skill CRs in and creates ToolRun
# CRs into (AGENT_NAMESPACE). Defaults to the release namespace when empty.
namespace: ""

ports:
  http: 8081
  callback: 8080

config:
  # Ignored when qdrant.enabled=true below (the in-cluster subchart's
  # Service URL is derived automatically instead). Set this to point at an
  # existing/external Qdrant instance otherwise.
  qdrantUrl: "http://qdrant:6333"
  qdrantCollection: tools
  qdrantVectorSize: 1536
  qdrantSkillsCollection: skills
  embeddingModel: text-embedding-3-small
  selectionModel: gpt-4o-2024-08-06
  skillTopK: 3
  # Base URL Job pods use to reach the callback receiver. Leave empty to
  # default to the in-cluster callback Service DNS name (ADR 0006).
  callbackBaseUrl: ""
  # API group/version for the Tool/Skill/ToolRun CRDs (ADR 0010). Must match
  # charts/tool-controller's installed CRDs.
  crdGroup: tool.recipe-agent.dev
  crdVersion: v1alpha1
  # DEV/TEST ONLY (see src/rbac/static-identity-resolver.ts) — JSON map of
  # bearer token -> {subject, roles}. Leave unset in any real deployment;
  # prefer a real OIDC/JWT identity resolver instead (not implemented yet).
  staticIdentities: ""

# Secrets: OPENAI_API_KEY (required), AGENT_CALLBACK_SECRET (required, no
# default — must not be guessable), AGENT_QDRANT_API_KEY (optional).
#
# By default the chart does NOT create a Secret — bring your own via
# `existingSecret` (e.g. populated by an external-secrets operator / sealed
# secrets / `kubectl create secret`). Setting `create: true` and passing
# values here is provided for local/dev convenience only: those values land
# in plaintext in the Helm release's stored values, which is not appropriate
# for production secrets.
secrets:
  create: false
  existingSecret: ""
  openaiApiKeyKey: OPENAI_API_KEY
  callbackSecretKey: AGENT_CALLBACK_SECRET
  qdrantApiKeyKey: AGENT_QDRANT_API_KEY
  # Only read when secrets.create=true.
  openaiApiKey: ""
  callbackSecret: ""
  qdrantApiKey: ""

service:
  invoke:
    type: ClusterIP
    port: 8081
  callback:
    type: ClusterIP
    port: 8080

ingress:
  # Exposes only the invoke Service (consumer-facing /invoke, /v1/*) — the
  # callback Service is deliberately never routed through an Ingress; it's
  # in-cluster-only for Job pods (ADR 0006).
  enabled: false
  className: ""
  annotations: {}
  host: ""
  path: /
  pathType: Prefix
  tls: []

networkPolicy:
  # Mirrors the network-boundary separation documented in ADR 0006: the
  # invoke port is for whoever calls the agent, the callback port is for
  # Job pods only, in-cluster. Disabled by default; enable once you know
  # your cluster's CNI supports NetworkPolicy and you've set the selectors
  # below.
  enabled: false
  # NetworkPolicyPeer list for the invoke port. Empty = allow from anywhere
  # in the cluster (still namespaced to this policy's namespace unless a
  # namespaceSelector is given in a peer).
  invokeFrom: []
  # podSelector.matchLabels identifying the Job pods allowed to reach the
  # callback port (e.g. labels applied by job-launcher.ts to launched Jobs).
  callbackFromPodSelector: {}

resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Matches the hardened run contract in run.sh / docs/security.md.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# The runtime image's root filesystem is read-only; only /tmp needs to be
# writable (matches --tmpfs /tmp in run.sh).
extraVolumes:
  - name: tmp
    emptyDir: {}
extraVolumeMounts:
  - name: tmp
    mountPath: /tmp

podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}

# GET /v1/models needs no auth, so it's a safe, cheap probe target.
livenessProbe:
  httpGet:
    path: /v1/models
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /v1/models
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

extraEnv: []

# Optional bundled Qdrant instance (github.com/qdrant/qdrant-helm). Disabled
# by default -- most real deployments should point config.qdrantUrl at an
# existing Qdrant (managed, shared, or deployed separately) instead of
# coupling its lifecycle to this release. Enabling this is meant for
# local/dev/single-cluster-demo convenience only: it's a single replica with
# no backup/disaster-recovery story (see the subchart's own README for its
# production limitations).
#
# Run `helm dependency update charts/agent-orchestrator` once before
# `helm install`/`helm package` so the subchart is fetched.
qdrant:
  enabled: false
  replicaCount: 1
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  # Set to true (or a string) to require an API key; then also set it as
  # config.qdrantApiKey / secrets.qdrantApiKey above so the orchestrator
  # sends the same key. Left disabled by default to keep the local/dev path
  # simple -- enable both sides together for anything less trusted than a
  # single-tenant dev cluster.
  apiKey: false

# Optional Open WebUI (github.com/open-webui/open-webui) chat UI in front of
# the orchestrator's OpenAI-compatible facade (ADR 0007: GET /v1/models,
# POST /v1/chat/completions). Disabled by default -- like the bundled
# Qdrant above, this is a local/dev/demo convenience, not something this
# chart takes a production stance on.
#
# Run `helm dependency update charts/agent-orchestrator` once before
# `helm install`/`helm upgrade`/`helm package` so the subchart is fetched.
#
# IMPORTANT auth caveat: Open WebUI sends `openaiApiKey` as a plain
# `Authorization: Bearer <key>` header on every request, and the
# orchestrator's StaticIdentityResolver (dev/test-only, see
# config.staticIdentities above) rejects any token not in its map. Set
# `openwebui.openaiApiKey` to some value AND add that same value as a key in
# config.staticIdentities, e.g.:
#   config.staticIdentities: '{"<same value as openwebui.openaiApiKey>": {"subject": "open-webui", "roles": ["reader"]}}'
# Left blank by default so this isn't silently broken -- NOTES.txt warns if
# openwebui.enabled=true and this is unset.
openwebui:
  enabled: false
  openaiApiKey: ""
  # Base URL Open WebUI targets for the OpenAI-compatible API. Defaults to
  # this chart's own invoke Service on the assumption the release is named
  # "agent-orchestrator" (this repo's documented convention, see README) --
  # override if you used a different release name. Same namespace as this
  # release either way (Open WebUI is installed as a subchart of it), so an
  # unqualified Service name resolves fine without a namespace suffix.
  openaiBaseApiUrl: "http://agent-orchestrator-invoke:8081/v1"
  # No local model runner / Pipelines needed -- Open WebUI only talks to the
  # orchestrator's OpenAI-compatible facade above.
  ollama:
    enabled: false
  pipelines:
    enabled: false
  persistence:
    size: 2Gi
  service:
    type: ClusterIP
  # Open WebUI loads a sentence-transformers embedding model at startup for
  # its (unused-by-us) local RAG feature even when it's otherwise idle --
  # 1Gi was observed OOMKilling the container (exit 137) in a live minikube
  # deploy. 2Gi request / 3Gi limit is comfortable headroom; lower once
  # confirmed stable for your workload.
  resources:
    requests:
      cpu: 250m
      memory: 2Gi
    limits:
      cpu: "1"
      memory: 3Gi
  # Optional Google OAuth login (in addition to Open WebUI's own local
  # email/password accounts -- this does NOT disable those, it adds a
  # "Continue with Google" button). Disabled by default.
  #
  # Setup (do this yourself, never paste the client secret in chat):
  # 1. Google Cloud Console -> APIs & Services -> Credentials -> Create
  #    Credentials -> OAuth client ID -> Application type "Web application".
  # 2. Authorized redirect URI: must exactly match how you access Open WebUI.
  #    For the documented port-forward workflow (README "Bundled Open WebUI"):
  #      http://localhost:8080/oauth/google/login/callback
  #    (add your Ingress host's equivalent URL too if `openwebui.ingress.enabled`).
  # 3. Create the client secret as a k8s Secret yourself (not via `helm
  #    --set`, so it never lands in stored release values or this chat):
  #      kubectl create secret generic agent-orchestrator-openwebui-google-oauth \
  #        -n <namespace> --from-literal=client-secret=<GOOGLE_CLIENT_SECRET>
  # 4. Set sso.google.enabled=true, sso.google.clientId=<GOOGLE_CLIENT_ID>
  #    (the client ID is not secret -- it's public in the redirect flow) and
  #    sso.google.clientExistingSecret=agent-orchestrator-openwebui-google-oauth.
  sso:
    enabled: false
    # Lets a first-time Google sign-in auto-create an Open WebUI account
    # (still governed by roleManagement/adminRoles below if you set those).
    enableSignup: true
    google:
      enabled: false
      clientId: ""
      clientExistingSecret: ""
      clientExistingSecretKey: "client-secret"
  # GOOGLE_REDIRECT_URI isn't a values.yaml field in the open-webui chart
  # (only the client id/secret are) -- set it explicitly here so it's not
  # left to request-based auto-detection. Must match the Authorized redirect
  # URI registered in Google Cloud Console exactly (see sso.google above).
  #
  # ENABLE_FORWARD_USER_INFO_HEADERS makes Open WebUI forward
  # X-OpenWebUI-Chat-Id (plus user info headers) on every upstream request --
  # the orchestrator uses the chat id to key its session-scoped active-skill
  # continuity (ADR 0012). Safe to leave on: without it every turn just
  # falls back to stateless skill re-selection.
  #
  # NOTE: Helm replaces arrays wholesale (no merge) -- if you override
  # extraEnvVars in your own values file, re-specify BOTH entries.
  extraEnvVars:
    - name: GOOGLE_REDIRECT_URI
      value: "http://localhost:8080/oauth/google/login/callback"
    - name: ENABLE_FORWARD_USER_INFO_HEADERS
      value: "true"

