name: Build, Publish & Deploy

# Single workflow (not three separate ones triggered off each other via
# workflow_run) so every job below shares one checkout of one commit SHA,
# and `needs:` gives real ordering guarantees instead of hoping two
# independently-triggered workflows happen to finish in the right order.
#
# Previously: "Publish images" and "Publish Helm charts" each had their own
# `on: push` trigger, and "Deploy" ran off `workflow_run` of "Publish images"
# only -- so Deploy could apply/restart before the charts workflow had
# finished (or even started), and a workflow_run-triggered job's default
# `actions/checkout` checks out the *current tip of main* rather than the
# commit that triggered the run it's reacting to. Back-to-back pushes could
# therefore deploy a different revision's charts/values than the one whose
# images were just built. Using `needs:` across jobs in one workflow instead
# means everything below is pinned to the same `github.sha`, and `deploy`
# can't start until `publish-charts` has actually finished.

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  changes:
    # Cheap, network-light job: figures out which images actually need a
    # rebuild, and whether charts/ changed, so downstream jobs only do work
    # when relevant. Runs on a GitHub-hosted runner since it doesn't touch
    # the internal registry or cluster.
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.result }}
      charts: ${{ steps.filter.outputs.charts }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            workflow:
              - '.github/workflows/release.yml'
            agent-orchestrator:
              - 'package.json'
              - 'package-lock.json'
              - 'packages/messaging/**'
              - 'apps/agent-orchestrator/**'
            opencode-swe-agent:
              - 'package.json'
              - 'package-lock.json'
              - 'packages/messaging/**'
              - 'packages/agent-runtime/**'
              - 'packages/github-app-auth/**'
              - 'apps/opencode-swe-agent/**'
            integration-gateway:
              - 'package.json'
              - 'package-lock.json'
              - 'packages/github-app-auth/**'
              - 'apps/integration-gateway/**'
            recipe-scraper:
              - 'package.json'
              - 'package-lock.json'
              - 'packages/messaging/**'
              - 'tools/recipe-scraper/**'
            recipe-publisher:
              - 'package.json'
              - 'package-lock.json'
              - 'packages/messaging/**'
              - 'tools/recipe-publisher/**'
            web-search:
              - 'package.json'
              - 'package-lock.json'
              - 'packages/messaging/**'
              - 'tools/web-search/**'
            core-controller:
              - 'controllers/core-controller/**'
            localtool-executor:
              - 'sidecars/localtool-executor/**'
            charts:
              - 'charts/**'

      - name: Compute image matrix
        id: matrix
        env:
          WORKFLOW_CHANGED: ${{ steps.filter.outputs.workflow }}
          AGENT_ORCHESTRATOR: ${{ steps.filter.outputs.agent-orchestrator }}
          OPENCODE_SWE_AGENT: ${{ steps.filter.outputs.opencode-swe-agent }}
          INTEGRATION_GATEWAY: ${{ steps.filter.outputs.integration-gateway }}
          RECIPE_SCRAPER: ${{ steps.filter.outputs.recipe-scraper }}
          RECIPE_PUBLISHER: ${{ steps.filter.outputs.recipe-publisher }}
          WEB_SEARCH: ${{ steps.filter.outputs.web-search }}
          CORE_CONTROLLER: ${{ steps.filter.outputs.core-controller }}
          LOCALTOOL_EXECUTOR: ${{ steps.filter.outputs.localtool-executor }}
        run: |
          cat <<'EOF' > all.json
          [
            {"image":"agent-orchestrator","changed_key":"AGENT_ORCHESTRATOR","dockerfile":"apps/agent-orchestrator/Dockerfile","context":"."},
            {"image":"opencode-swe-agent","changed_key":"OPENCODE_SWE_AGENT","dockerfile":"apps/opencode-swe-agent/Dockerfile","context":"."},
            {"image":"integration-gateway","changed_key":"INTEGRATION_GATEWAY","dockerfile":"apps/integration-gateway/Dockerfile","context":"."},
            {"image":"recipe-scraper","changed_key":"RECIPE_SCRAPER","dockerfile":"tools/recipe-scraper/Dockerfile","context":"."},
            {"image":"recipe-publisher","changed_key":"RECIPE_PUBLISHER","dockerfile":"tools/recipe-publisher/Dockerfile","context":"."},
            {"image":"web-search","changed_key":"WEB_SEARCH","dockerfile":"tools/web-search/Dockerfile","context":"."},
            {"image":"core-controller","changed_key":"CORE_CONTROLLER","dockerfile":"controllers/core-controller/Dockerfile","context":"controllers/core-controller"},
            {"image":"localtool-executor-node","changed_key":"LOCALTOOL_EXECUTOR","dockerfile":"sidecars/localtool-executor/Dockerfile","context":"sidecars/localtool-executor","build_args":"BASE_IMAGE=node:24-bookworm-slim\nRUNTIME=node"},
            {"image":"localtool-executor-python","changed_key":"LOCALTOOL_EXECUTOR","dockerfile":"sidecars/localtool-executor/Dockerfile","context":"sidecars/localtool-executor","build_args":"BASE_IMAGE=python:3.12-slim-bookworm\nRUNTIME=python"},
            {"image":"localtool-executor-go","changed_key":"LOCALTOOL_EXECUTOR","dockerfile":"sidecars/localtool-executor/Dockerfile","context":"sidecars/localtool-executor","build_args":"BASE_IMAGE=golang:1.24-bookworm\nRUNTIME=go"},
            {"image":"localtool-executor-shell","changed_key":"LOCALTOOL_EXECUTOR","dockerfile":"sidecars/localtool-executor/Dockerfile","context":"sidecars/localtool-executor","build_args":"BASE_IMAGE=debian:bookworm-slim\nRUNTIME=shell"}
          ]
          EOF

          if [ "$WORKFLOW_CHANGED" = "true" ]; then
            # The workflow itself changed -- rebuild everything so a broken
            # matrix/cache config surfaces immediately, not on the next
            # unrelated image change.
            MATRIX=$(jq -c '.' all.json)
          else
            FLAGS=$(jq -n \
              --arg AGENT_ORCHESTRATOR "$AGENT_ORCHESTRATOR" \
              --arg OPENCODE_SWE_AGENT "$OPENCODE_SWE_AGENT" \
              --arg INTEGRATION_GATEWAY "$INTEGRATION_GATEWAY" \
              --arg RECIPE_SCRAPER "$RECIPE_SCRAPER" \
              --arg RECIPE_PUBLISHER "$RECIPE_PUBLISHER" \
              --arg WEB_SEARCH "$WEB_SEARCH" \
              --arg CORE_CONTROLLER "$CORE_CONTROLLER" \
              --arg LOCALTOOL_EXECUTOR "$LOCALTOOL_EXECUTOR" \
              '{AGENT_ORCHESTRATOR:$AGENT_ORCHESTRATOR,OPENCODE_SWE_AGENT:$OPENCODE_SWE_AGENT,INTEGRATION_GATEWAY:$INTEGRATION_GATEWAY,RECIPE_SCRAPER:$RECIPE_SCRAPER,RECIPE_PUBLISHER:$RECIPE_PUBLISHER,WEB_SEARCH:$WEB_SEARCH,CORE_CONTROLLER:$CORE_CONTROLLER,LOCALTOOL_EXECUTOR:$LOCALTOOL_EXECUTOR}')
            MATRIX=$(jq -c --argjson flags "$FLAGS" 'map(select($flags[.changed_key] == "true"))' all.json)
          fi

          echo "Building: $(echo "$MATRIX" | jq -c '[.[].image]')"
          echo "result=$MATRIX" >> "$GITHUB_OUTPUT"

  publish-images:
    needs: changes
    runs-on: arc-runner-set-agent-controller
    # Self-hosted runner: only ever reachable via push to main (collaborators only).
    # Guard so a fork that somehow re-targets this job cannot run it on our infra.
    if: github.repository == 'imaustink/agent-controller' && needs.changes.outputs.matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Docker login
        run: |
          echo "$REGISTRY_PASSWORD" | docker login registry.kurpuis.com:5000 \
            -u "$REGISTRY_USERNAME" --password-stdin
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: registry.kurpuis.com:5000/${{ matrix.image }}:latest
          # GitHub Actions cache backend, scoped per image so unrelated images
          # don't evict each other's layers. `mode=max` also caches
          # intermediate (build-stage) layers, not just the final stage --
          # needed here since npm ci / go mod download / apt-get all happen
          # in earlier stages than what gets pushed.
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

  publish-charts:
    # Publishes the two Helm charts (charts/agent-controller,
    # charts/community-components) as OCI artifacts to ghcr.io whenever
    # something under charts/ changes on main. Runs on a GitHub-hosted
    # runner (not the arc-runner-set-agent-controller self-hosted runner
    # used by publish-images) -- this job only needs outbound internet to
    # ghcr.io and a GITHUB_TOKEN, not access to the internal cluster or
    # registry.kurpuis.com.
    #
    # Charts are pushed under their Chart.yaml `version` -- OCI tags are
    # mutable, so pushing again at the same version overwrites that tag
    # rather than creating a new one. Bump `version` in the relevant
    # Chart.yaml before merging if you want a new immutable release tag to
    # show up.
    #
    # Install with:
    #   helm install agent-controller oci://ghcr.io/imaustink/charts/agent-controller --version <version>
    #   helm install community-components oci://ghcr.io/imaustink/charts/community-components --version <version>
    needs: changes
    runs-on: ubuntu-latest
    # Guard so a fork that somehow re-targets this job cannot publish under our package namespace.
    if: github.repository == 'imaustink/agent-controller' && needs.changes.outputs.charts == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Sync core-controller CRDs into the Helm chart
        # charts/agent-controller/charts/core-controller/crds/*.yaml is
        # generated (not committed, see its README.md) -- Helm's crds/
        # convention needs the files physically present before `helm
        # dependency update`/`helm package` will pick them up.
        run: cp controllers/core-controller/config/crd/bases/*.yaml charts/agent-controller/charts/core-controller/crds/

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.18.4

      - name: Helm login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            -u "${{ github.actor }}" --password-stdin

      - name: Fetch agent-controller chart dependencies
        run: |
          # Helm doesn't recurse into file:// subchart dependencies, so the
          # agent-orchestrator subchart's own qdrant dependency needs its own
          # `dependency update` before the parent chart's.
          helm dependency update charts/agent-controller/charts/agent-orchestrator
          helm dependency update charts/agent-controller

      - name: Package charts
        run: |
          mkdir -p /tmp/charts
          helm package charts/agent-controller -d /tmp/charts
          helm package charts/community-components -d /tmp/charts

      - name: Push charts to GHCR
        run: |
          for tgz in /tmp/charts/*.tgz; do
            helm push "$tgz" oci://ghcr.io/imaustink/charts
          done

  deploy:
    needs: [publish-images, publish-charts]
    runs-on: arc-runner-set-agent-controller
    # Self-hosted runner: only ever reachable via push to main (collaborators only).
    # Guard so a fork that somehow re-targets this job cannot run it on our infra.
    #
    # `always()` because publish-images/publish-charts are legitimately
    # skipped when nothing relevant changed (e.g. a docs-only push) -- a
    # skip must not block deploy the way a failure should. Explicitly reject
    # failure/cancellation instead of just checking for 'success' so deploy
    # doesn't run (and restart images) on top of a build it can't trust.
    if: |
      always() &&
      github.repository == 'imaustink/agent-controller' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.18.4

      - uses: azure/setup-kubectl@v4

      - name: Sync core-controller CRDs into the Helm chart
        # charts/agent-controller/charts/core-controller/crds/*.yaml is
        # generated (not committed, see its README.md) -- Helm's crds/
        # convention needs the files physically present before `helm
        # dependency update`/`helm upgrade` will pick them up. Same step
        # publish-charts runs before packaging.
        run: cp controllers/core-controller/config/crd/bases/*.yaml charts/agent-controller/charts/core-controller/crds/

      - name: Fetch agent-controller chart dependencies
        run: |
          # Helm doesn't recurse into file:// subchart dependencies, so the
          # agent-orchestrator subchart's own qdrant dependency needs its own
          # `dependency update` before the parent chart's.
          helm dependency update charts/agent-controller/charts/agent-orchestrator
          helm dependency update charts/agent-controller

      - name: Helm upgrade agent-controller
        run: |
          helm upgrade --install agent-controller charts/agent-controller \
            -f charts/agent-controller/values-production.yaml \
            -n controller-agent --timeout 5m

      - name: Helm upgrade community-components
        run: |
          helm upgrade --install community-components charts/community-components \
            -f charts/community-components/values-production.yaml \
            -n controller-agent --timeout 5m

      # Tool/Agent Jobs (recipe-scraper, web-search, web-fetch,
      # recipe-publisher, opencode-swe-agent) are launched fresh per-invocation
      # by core-controller and always pull `:latest` -- no restart needed.
      # Only the long-running Deployments need one to pick up a new image.
      - name: Rollout restart
        run: |
          kubectl rollout restart deploy/agent-orchestrator deploy/core-controller deploy/agent-controller-integration-gateway -n controller-agent
          kubectl rollout status deploy/agent-orchestrator deploy/core-controller deploy/agent-controller-integration-gateway -n controller-agent --timeout=5m
