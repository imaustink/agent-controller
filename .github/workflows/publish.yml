name: Publish images

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  publish:
    runs-on: arc-runner-set-agent-controller
    # Self-hosted runner: only ever reachable via push to main (collaborators only).
    # Guard so a fork that somehow re-targets this job cannot run it on our infra.
    if: github.repository == 'imaustink/agent-controller'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: agent-orchestrator
            dockerfile: apps/agent-orchestrator/Dockerfile
            context: .
          - image: opencode-swe-agent
            dockerfile: apps/opencode-swe-agent/Dockerfile
            context: .
          - image: recipe-scraper
            dockerfile: tools/recipe-scraper/Dockerfile
            context: .
          - image: recipe-publisher
            dockerfile: tools/recipe-publisher/Dockerfile
            context: .
          - image: web-search
            dockerfile: tools/web-search/Dockerfile
            context: .
          - image: core-controller
            dockerfile: controllers/core-controller/Dockerfile
            context: controllers/core-controller
          - image: localtool-executor-node
            dockerfile: sidecars/localtool-executor/Dockerfile
            context: sidecars/localtool-executor
            build_args: |
              BASE_IMAGE=node:24-bookworm-slim
              RUNTIME=node
          - image: localtool-executor-python
            dockerfile: sidecars/localtool-executor/Dockerfile
            context: sidecars/localtool-executor
            build_args: |
              BASE_IMAGE=python:3.12-slim-bookworm
              RUNTIME=python
          - image: localtool-executor-go
            dockerfile: sidecars/localtool-executor/Dockerfile
            context: sidecars/localtool-executor
            build_args: |
              BASE_IMAGE=golang:1.24-bookworm
              RUNTIME=go
          - image: localtool-executor-shell
            dockerfile: sidecars/localtool-executor/Dockerfile
            context: sidecars/localtool-executor
            build_args: |
              BASE_IMAGE=debian:bookworm-slim
              RUNTIME=shell
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Docker login
        run: |
          echo "$REGISTRY_PASSWORD" | docker login registry.kurpuis.com:5000 \
            -u "$REGISTRY_USERNAME" --password-stdin
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: registry.kurpuis.com:5000/${{ matrix.image }}:latest
