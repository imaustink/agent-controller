---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: agents.core.controller-agent.dev
spec:
  group: core.controller-agent.dev
  names:
    kind: Agent
    listKind: AgentList
    plural: agents
    singular: agent
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Agent is the Schema for the agents API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Agent
            properties:
              agentPrompt:
                description: |-
                  agentPrompt is the system prompt the SUB-AGENT's own internal loop runs
                  with (loaded by the agent process itself, not the orchestrator). Defines
                  the agent's persona, method, and constraints. Optional: absent -> the
                  agent image's built-in default prompt applies.
                type: string
              allowedRoles:
                description: allowedRoles gates RAG retrieval (RBAC filter), same
                  semantics as Tool.
                items:
                  type: string
                minItems: 1
                type: array
              description:
                description: description is fed to the orchestrator's embedder for
                  RAG retrieval.
                minLength: 1
                type: string
              env:
                description: env are static, non-secret environment variables for
                  the Job container.
                items:
                  description: |-
                    EnvVar is a plain name/value pair injected into the tool's Job container.
                    Values that must come from Secrets belong on `secretEnv` below (or the
                    ToolRun's callback secretRef) — never a literal here.
                  properties:
                    name:
                      description: name of the environment variable.
                      type: string
                    value:
                      description: value of the environment variable.
                      type: string
                  required:
                  - name
                  - value
                  type: object
                type: array
              identityProviders:
                description: |-
                  identityProviders declares which external identity providers (e.g.
                  "github") must be linked for the calling user before this Agent can be
                  launched. This controller does not consume the field itself — it is
                  read by the agent-orchestrator when deciding whether/how to launch an
                  AgentRun for a given user (e.g. resolving and injecting a per-user
                  token via AgentRunSpec.SecretEnv) — but it belongs on the CRD as the
                  source of truth an operator deploys alongside the rest of the Agent
                  catalog entry.
                items:
                  type: string
                type: array
              image:
                description: |-
                  image is the agent-loop container the AgentRun controller launches as a
                  Job (e.g. the agent-orchestrator image running in scoped sub-agent mode).
                type: string
              input:
                description: input describes the goal contract this agent expects,
                  in plain language.
                type: string
              maxIterations:
                description: maxIterations bounds the agent's internal loop as a cost/runaway
                  guard.
                format: int32
                minimum: 1
                type: integer
              model:
                description: |-
                  model is the LLM model id the agent loop should use (advisory; the
                  agent image decides how to interpret it).
                type: string
              orchestratorPrompt:
                description: |-
                  orchestratorPrompt is guidance injected into the PARENT orchestrator's
                  planner when this agent is a retrieval candidate — how and when to
                  delegate to it, what to pass as the goal, how to interpret its replies.
                  It shapes the orchestrator's behavior, NOT the sub-agent's own loop
                  (that's agentPrompt below). Trusted, catalog-authored (same trust model
                  as a Skill's markdown). Optional: absent -> the orchestrator relies on
                  description/input/output alone.
                type: string
              output:
                description: output describes the final response shape the agent reports.
                type: string
              resources:
                description: resources are the Job container's compute resource requirements.
                properties:
                  limits:
                    additionalProperties:
                      type: string
                    type: object
                  requests:
                    additionalProperties:
                      type: string
                    type: object
                type: object
              secretEnv:
                description: |-
                  secretEnv are environment variables sourced from Secret keys (same
                  namespace), resolved via secretKeyRef at Job-build time — same
                  discipline as ToolSpec.SecretEnv (never a literal secret in the CR).
                items:
                  description: |-
                    SecretEnvVar names a Job container environment variable whose value comes
                    from a Secret key in the SAME namespace as the Tool/ToolRun, resolved via
                    corev1.EnvVarSource.SecretKeyRef at Job-build time. Only the reference
                    (secret name + key) lives in the Tool spec — never the secret value
                    itself, same discipline as ToolRunCallback.SecretRef for the callback
                    HMAC secret. Needed because ordinary tool containers (e.g. recipe-scraper's
                    OPENAI_API_KEY, recipe-publisher's GITHUB_TOKEN) require real secrets that
                    `env` (non-secret, catalog metadata) cannot carry.
                  properties:
                    name:
                      description: name of the environment variable to set in the
                        tool's Job container.
                      type: string
                    secretRef:
                      description: secretRef selects the Secret key providing the
                        value.
                      properties:
                        key:
                          description: key within the Secret's data.
                          type: string
                        name:
                          description: name of the Secret.
                          type: string
                      required:
                      - key
                      - name
                      type: object
                  required:
                  - name
                  - secretRef
                  type: object
                type: array
              serviceAccountName:
                description: serviceAccountName the Job pod runs as. Must already
                  exist in-cluster.
                type: string
              skillRefs:
                description: |-
                  skillRefs are the names of Skill CRs this agent may load into its own
                  loop (same trust model as the parent orchestrator's skill layer).
                items:
                  type: string
                type: array
              tier:
                description: tier is an operator-defined cost/trust classification.
                type: string
            required:
            - allowedRoles
            - description
            - image
            - input
            - output
            - serviceAccountName
            type: object
          status:
            description: status defines the observed state of Agent
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the Agent resource.
                  Each condition has a unique type and reflects the status of a specific aspect of the resource.

                  Standard condition types include:
                  - "Available": the resource is fully functional
                  - "Progressing": the resource is being created or updated
                  - "Degraded": the resource failed to reach or maintain its desired state

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
