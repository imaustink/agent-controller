# This rule is not used by the project core-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the core.controller-agent.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: core-controller
    app.kubernetes.io/managed-by: kustomize
  name: tool-editor-role
rules:
- apiGroups:
  - core.controller-agent.dev
  resources:
  - tools
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - core.controller-agent.dev
  resources:
  - tools/status
  verbs:
  - get
