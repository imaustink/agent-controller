# This rule is not used by the project tool-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to core.controller-agent.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: tool-controller
    app.kubernetes.io/managed-by: kustomize
  name: agentrun-viewer-role
rules:
- apiGroups:
  - core.controller-agent.dev
  resources:
  - agentruns
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - core.controller-agent.dev
  resources:
  - agentruns/status
  verbs:
  - get
